<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Scivra Logo — Impossible Triangle (Student-friendly)
    三色不可能三角：天蓝 + 紫 + 珊瑚
    圆角柔和，亲切有活力，面向K12学生
  -->
  <defs>
    <linearGradient id="armBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#2D9CDB"/>
    </linearGradient>
    <linearGradient id="armPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B51E0"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="armCoral" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F2994A"/>
      <stop offset="100%" stop-color="#EB5757"/>
    </linearGradient>
  </defs>

  <!-- 蓝臂 (左下) -->
  <path
    d="M 68,82 Q 14,170 22,176 Q 28,182 36,176 L 112,176 Q 120,176 118,168 L 106,152 Q 104,148 96,148 L 56,148 Q 52,148 54,144 L 78,100 Q 80,96 76,92 Z"
    fill="url(#armBlue)"
  />

  <!-- 紫臂 (顶部) -->
  <path
    d="M 52,108 Q 48,116 52,120 L 72,120 Q 76,120 78,116 L 98,80 Q 100,76 104,76 L 106,76 Q 110,76 112,80 L 132,116 Q 134,120 138,120 L 154,108 Q 158,104 156,100 L 108,22 Q 104,16 98,22 Z"
    fill="url(#armPurple)"
  />

  <!-- 珊瑚臂 (右下) -->
  <path
    d="M 88,176 Q 84,176 86,170 L 98,152 Q 100,148 106,148 L 148,148 Q 152,148 154,144 L 138,108 Q 136,104 132,108 L 122,124 Q 120,128 116,128 L 140,168 Q 142,172 146,172 L 170,172 Q 178,172 174,180 Q 170,186 162,180 L 88,176 Z"
    fill="url(#armCoral)"
  />

  <!-- Scivra 文字 -->
  <text x="100" y="198" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4B5563">
    Scivra
  </text>
</svg>
