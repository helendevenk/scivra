<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beer's Law Lab — Scivra AP Chemistry</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }
    .data-val, .readout { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #ui {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none; padding: 12px;
    }
    .panel {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 8px;
      padding: 12px 14px;
      pointer-events: all;
      backdrop-filter: blur(10px);
    }
    .top-bar { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
    .bottom-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    h1 { font-size: 1.05rem; font-weight: 600; margin-bottom: 2px; }
    .badge {
      font-size: 0.6rem; background: rgba(16,185,129,0.18);
      color: #6ee7b7; padding: 2px 7px; border-radius: 10px;
      vertical-align: middle; margin-left: 6px;
    }
    .subtitle { font-size: 0.7rem; color: #94a3b8; }
    button {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      color: #6ee7b7; padding: 5px 10px; border-radius: 5px;
      cursor: pointer; font-size: 0.72rem; transition: all 0.2s;
    }
    button:hover { background: rgba(16,185,129,0.25); }
    select {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      color: #6ee7b7; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem;
    }
    select option { background: #1e293b; color: #e2e8f0; }
    input[type=range] { accent-color: #10b981; height: 4px; width: 100%; }
    .controls { display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
    .controls label { font-size: 0.68rem; color: #94a3b8; }
    .panel-title { font-size: 0.7rem; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
    .data-row {
      display: flex; justify-content: space-between; padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.72rem;
    }
    .big-val { font-size: 1.8rem; font-weight: 700; color: #6ee7b7; font-family: 'JetBrains Mono', monospace; text-align: center; }
    .formula-panel { max-width: 380px; }
    .formula-desc { font-size: 0.62rem; color: #94a3b8; margin-bottom: 6px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Beer's Law Lab <span class="badge">AP Chemistry</span></h1>
      <p class="subtitle">Absorbance = ε × b × c — adjust concentration and path length</p>
    </div>
    <div class="panel controls">
      <label>Solution:</label>
      <select id="solutionSelect">
        <option value="0">CuSO₄ (blue)</option>
        <option value="1">KMnO₄ (purple)</option>
        <option value="2">CoCl₂ (pink)</option>
      </select>
      <label>Concentration: <span class="data-val" id="concDisplay">0.10</span> mol/L</label>
      <input type="range" id="concSlider" min="0" max="100" value="10">
      <label>Path Length: <span class="data-val" id="pathDisplay">1.0</span> cm</label>
      <input type="range" id="pathSlider" min="1" max="10" value="2">
      <label>Wavelength: <span class="data-val" id="waveDisplay">520</span> nm</label>
      <input type="range" id="waveSlider" min="400" max="700" value="520">
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel" style="min-width:180px;">
      <div class="panel-title">Measurements</div>
      <div class="big-val" id="absDisplay">0.000</div>
      <div style="text-align:center;font-size:0.65rem;color:#94a3b8;">Absorbance (A)</div>
      <div class="data-row"><span>Transmittance</span><span class="data-val" id="transDisplay">100.0%</span></div>
      <div class="data-row"><span>ε (molar abs.)</span><span class="data-val" id="epsDisplay">—</span></div>
    </div>
    <div class="panel formula-panel">
      <div class="panel-title">Beer-Lambert Law</div>
      <div id="formulaDisplay"></div>
    </div>
  </div>
</div>

<script>
const SOLUTIONS = [
  { name: 'CuSO₄', color: [0, 100, 200], peakWl: 635, epsilon: 5.0 },
  { name: 'KMnO₄', color: [140, 0, 160], peakWl: 525, epsilon: 18.5 },
  { name: 'CoCl₂', color: [200, 50, 100], peakWl: 510, epsilon: 4.8 }
];

let sol = 0, conc = 0.1, pathLen = 1.0, wavelength = 520;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const graphPoints = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function getEpsilonAtWl(s, wl) {
  const peak = SOLUTIONS[s].peakWl;
  const eps = SOLUTIONS[s].epsilon;
  const dist = Math.abs(wl - peak);
  return eps * Math.exp(-(dist * dist) / (2 * 50 * 50));
}

function wavelengthToColor(wl) {
  let r = 0, g = 0, b = 0;
  if (wl >= 380 && wl < 440) { r = -(wl-440)/(440-380); b = 1; }
  else if (wl >= 440 && wl < 490) { g = (wl-440)/(490-440); b = 1; }
  else if (wl >= 490 && wl < 510) { g = 1; b = -(wl-510)/(510-490); }
  else if (wl >= 510 && wl < 580) { r = (wl-510)/(580-510); g = 1; }
  else if (wl >= 580 && wl < 645) { r = 1; g = -(wl-645)/(645-580); }
  else if (wl >= 645 && wl <= 780) { r = 1; }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

function update() {
  const eps = getEpsilonAtWl(sol, wavelength);
  const A = eps * pathLen * conc;
  const T = Math.pow(10, -A);

  document.getElementById('absDisplay').textContent = A.toFixed(3);
  document.getElementById('transDisplay').textContent = (T * 100).toFixed(1) + '%';
  document.getElementById('epsDisplay').textContent = eps.toFixed(2);

  draw(A, T);
}

function draw(A, T) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Cuvette
  const cx = w * 0.45, cy = h * 0.45;
  const cuW = 60 + pathLen * 20, cuH = 120;

  // Solution color based on concentration
  const sc = SOLUTIONS[sol].color;
  const alpha = Math.min(conc * 2, 0.95);
  ctx.fillStyle = `rgba(${sc[0]},${sc[1]},${sc[2]},${alpha})`;
  ctx.strokeStyle = 'rgba(16,185,129,0.3)';
  ctx.lineWidth = 2;

  // Cuvette outline
  ctx.beginPath();
  ctx.rect(cx - cuW/2, cy - cuH/2, cuW, cuH);
  ctx.fill();
  ctx.stroke();

  // Glass edges
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - cuW/2 - 4, cy - cuH/2 - 4);
  ctx.lineTo(cx - cuW/2 - 4, cy + cuH/2 + 4);
  ctx.moveTo(cx + cuW/2 + 4, cy - cuH/2 - 4);
  ctx.lineTo(cx + cuW/2 + 4, cy + cuH/2 + 4);
  ctx.stroke();

  // Light beam (incoming)
  const beamColor = wavelengthToColor(wavelength);
  ctx.strokeStyle = `rgba(${beamColor[0]},${beamColor[1]},${beamColor[2]},0.8)`;
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(cx - cuW/2 - 100, cy);
  ctx.lineTo(cx - cuW/2, cy);
  ctx.stroke();

  // Light beam (outgoing, attenuated)
  ctx.strokeStyle = `rgba(${beamColor[0]},${beamColor[1]},${beamColor[2]},${T * 0.8})`;
  ctx.lineWidth = 8 * T;
  ctx.beginPath();
  ctx.moveTo(cx + cuW/2, cy);
  ctx.lineTo(cx + cuW/2 + 100, cy);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('I₀', cx - cuW/2 - 50, cy - 15);
  ctx.fillText('I', cx + cuW/2 + 50, cy - 15);
  ctx.fillText(`b = ${pathLen.toFixed(1)} cm`, cx, cy + cuH/2 + 20);
  ctx.fillText(`c = ${conc.toFixed(2)} M`, cx, cy - cuH/2 - 10);

  // Detector
  ctx.fillStyle = 'rgba(16,185,129,0.15)';
  ctx.strokeStyle = 'rgba(16,185,129,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.rect(cx + cuW/2 + 95, cy - 20, 30, 40);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#94a3b8';
  ctx.font = '9px Segoe UI, sans-serif';
  ctx.fillText('detector', cx + cuW/2 + 110, cy + 35);

  // Graph: A vs c (bottom right area)
  const gx = w * 0.68, gy = h * 0.25;
  const gw = w * 0.25, gh = h * 0.35;

  ctx.strokeStyle = 'rgba(16,185,129,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(gx, gy, gw, gh);

  // Axes labels
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Concentration (mol/L)', gx + gw/2, gy + gh + 16);
  ctx.save();
  ctx.translate(gx - 14, gy + gh/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Absorbance', 0, 0);
  ctx.restore();

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  for (let i = 1; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(gx, gy + gh * i/5);
    ctx.lineTo(gx + gw, gy + gh * i/5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx + gw * i/5, gy);
    ctx.lineTo(gx + gw * i/5, gy + gh);
    ctx.stroke();
  }

  // Beer's Law line
  const eps = getEpsilonAtWl(sol, wavelength);
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const maxC = 1.0, maxA = 3.0;
  for (let c = 0; c <= maxC; c += 0.01) {
    const a = eps * pathLen * c;
    const px = gx + (c / maxC) * gw;
    const py = gy + gh - (Math.min(a, maxA) / maxA) * gh;
    c === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Current point
  const cpx = gx + (conc / maxC) * gw;
  const cpy = gy + gh - (Math.min(A, maxA) / maxA) * gh;
  ctx.beginPath();
  ctx.arc(cpx, cpy, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#6ee7b7';
  ctx.fill();

  // Axis values
  ctx.fillStyle = '#64748b';
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    ctx.fillText((maxA * i/5).toFixed(1), gx - 3, gy + gh - gh * i/5 + 3);
  }
  ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    ctx.fillText((maxC * i/5).toFixed(1), gx + gw * i/5, gy + gh + 10);
  }
}

document.getElementById('solutionSelect').addEventListener('change', e => { sol = parseInt(e.target.value); update(); });
document.getElementById('concSlider').addEventListener('input', e => {
  conc = parseInt(e.target.value) / 100;
  document.getElementById('concDisplay').textContent = conc.toFixed(2);
  update();
});
document.getElementById('pathSlider').addEventListener('input', e => {
  pathLen = parseInt(e.target.value) * 0.5;
  document.getElementById('pathDisplay').textContent = pathLen.toFixed(1);
  update();
});
document.getElementById('waveSlider').addEventListener('input', e => {
  wavelength = parseInt(e.target.value);
  document.getElementById('waveDisplay').textContent = wavelength;
  update();
});

function renderFormulas() {
  const el = document.getElementById('formulaDisplay');
  el.innerHTML = '';
  const formulas = [
    { tex: 'A = \\varepsilon \\cdot b \\cdot c', desc: 'ε = molar absorptivity, b = path length, c = concentration' },
    { tex: 'T = 10^{-A} = \\frac{I}{I_0}', desc: 'Transmittance: fraction of light passing through' }
  ];
  formulas.forEach(f => {
    const div = document.createElement('div');
    try { katex.render(f.tex, div, { displayMode: true, throwOnError: false }); }
    catch { div.textContent = f.tex; }
    el.appendChild(div);
    const desc = document.createElement('div');
    desc.className = 'formula-desc'; desc.textContent = f.desc;
    el.appendChild(desc);
  });
}

renderFormulas();
update();
</script>
</body>
</html>
