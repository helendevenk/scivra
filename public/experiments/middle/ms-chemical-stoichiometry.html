<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemical Stoichiometry — Scivra Middle School Chemistry</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',-apple-system,sans-serif;background:#0f172a;color:#e8eaf0;overflow:hidden;height:100vh}
    .header{padding:14px 24px;background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(6,182,212,.07));border-bottom:1px solid rgba(16,185,129,.2);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .badges{display:flex;gap:8px}.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-ms{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:#6ee7b7}
    .badge-free{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac}
    .header h1{font-size:1.4rem;font-weight:700;color:#f0f4ff;flex:1}
    .header p{font-size:.85rem;color:#94a3b8;width:100%;margin-top:-8px}
    .layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 60px)}
    .sidebar{background:#0f172a;border-right:1px solid rgba(255,255,255,.07);overflow-y:auto}
    .section{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
    .section-title{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
    .param-row{margin-bottom:12px}
    .param-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .param-name{font-size:12px;color:#94a3b8}
    .param-val{font-size:12px;font-weight:600;color:#6ee7b7;font-family:'JetBrains Mono',monospace}
    input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:rgba(16,185,129,.2);border-radius:2px;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#10b981;cursor:pointer}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
    .stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(16,185,129,.15);border-radius:8px;padding:8px 10px}
    .stat-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
    .stat-value{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .v-green{color:#6ee7b7} .v-cyan{color:#67e8f9} .v-amber{color:#fcd34d} .v-rose{color:#fda4af}
    .formula-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:8px;padding:9px 12px;margin-bottom:7px}
    .select-row{margin-bottom:12px}
    .select-row select{width:100%;padding:6px 10px;border-radius:6px;border:1px solid rgba(16,185,129,.25);background:#0f172a;color:#6ee7b7;font-size:12px}
    .btn{width:100%;padding:9px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:8px}
    .btn-primary{border:1px solid rgba(16,185,129,.3);background:rgba(16,185,129,.12);color:#6ee7b7}
    .canvas-wrap{position:relative}.canvas-wrap canvas{display:block;width:100%;height:100%}
    .katex{font-size:1em}.katex .base{color:#6ee7b7}
    .limiting-badge{margin-top:6px;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;text-align:center;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
  </style>
</head>
<body>
<div class="header">
  <div class="badges"><span class="badge badge-ms">CHEMISTRY MS</span><span class="badge badge-free">FREE</span></div>
  <h1>Chemical Stoichiometry</h1>
  <p>Mole ratios, limiting reagents, and reaction yields with atom visualization</p>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="section">
      <div class="section-title">Reaction: 2H₂ + O₂ → 2H₂O</div>
      <div class="param-row">
        <div class="param-label"><span class="param-name">Moles H₂</span><span class="param-val" id="lblA">3.0</span></div>
        <input type="range" id="sldA" min="0.5" max="10" step="0.5" value="3">
      </div>
      <div class="param-row">
        <div class="param-label"><span class="param-name">Moles O₂</span><span class="param-val" id="lblB">5.0</span></div>
        <input type="range" id="sldB" min="0.5" max="10" step="0.5" value="5">
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Limiting Reagent</div><div class="stat-value v-rose" id="valLim">H₂</div></div>
      <div class="stat-card"><div class="stat-label">Product (H₂O)</div><div class="stat-value v-cyan" id="valProd">3.0 mol</div></div>
      <div class="stat-card"><div class="stat-label">Excess O₂</div><div class="stat-value v-amber" id="valExc">3.5 mol</div></div>
      <div class="stat-card"><div class="stat-label">Yield</div><div class="stat-value v-green" id="valYield">100%</div></div>
    </div>
    <div class="section">
      <div class="formula-box" id="fRatio"></div>
    </div>
  </div>
  <div class="canvas-wrap"><canvas id="cv"></canvas></div>
</div>
<script>
(function(){
  const cv = document.getElementById('cv'); const ctx = cv.getContext('2d');
  let molesA = 3, molesB = 5;
  // Reaction: 2H2 + O2 -> 2H2O. Ratio: 2:1:2
  function calc() {
    const needB = molesA / 2; // O2 needed for all H2
    const needA = molesB * 2; // H2 needed for all O2
    let limiting, product, excessAmt, excessName;
    if (needB <= molesB) {
      limiting = 'H₂'; product = molesA; excessAmt = molesB - needB; excessName = 'O₂';
    } else {
      limiting = 'O₂'; product = molesB * 2; excessAmt = molesA - needA; excessName = 'H₂';
    }
    return { limiting, product, excessAmt, excessName };
  }
  function update() {
    const { limiting, product, excessAmt, excessName } = calc();
    document.getElementById('valLim').textContent = limiting;
    document.getElementById('valProd').textContent = product.toFixed(1) + ' mol';
    document.getElementById('valExc').textContent = excessAmt.toFixed(1) + ' mol ' + excessName;
    document.getElementById('valYield').textContent = '100%';
  }
  function draw() {
    const dpr = window.devicePixelRatio || 1;
    const rect = cv.parentElement.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    cv.width = w * dpr; cv.height = h * dpr;
    cv.style.width = w + 'px'; cv.style.height = h + 'px';
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#0a0f1e'; ctx.fillRect(0, 0, w, h);
    const { limiting, product, excessAmt } = calc();
    const cx = w / 2, topY = h * 0.15;
    // Reactants section
    ctx.font = '16px sans-serif'; ctx.fillStyle = '#64748b'; ctx.textAlign = 'center';
    ctx.fillText('REACTANTS', cx, topY);
    // Draw H2 molecules
    const h2Count = Math.min(Math.round(molesA * 2), 20);
    for (let i = 0; i < h2Count; i++) {
      const x = w * 0.15 + (i % 5) * 40;
      const y = topY + 30 + Math.floor(i / 5) * 35;
      ctx.beginPath(); ctx.arc(x, y, 10, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(59,130,246,0.6)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x + 15, y, 10, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(59,130,246,0.6)'; ctx.fill();
      ctx.strokeStyle = 'rgba(59,130,246,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x + 10, y); ctx.lineTo(x + 5, y); ctx.stroke();
    }
    ctx.font = '12px JetBrains Mono, monospace'; ctx.fillStyle = '#93c5fd';
    ctx.fillText('H₂: ' + molesA.toFixed(1) + ' mol', w * 0.25, topY + 20);
    // Draw O2 molecules
    const o2Count = Math.min(Math.round(molesB * 2), 20);
    for (let i = 0; i < o2Count; i++) {
      const x = w * 0.65 + (i % 5) * 40;
      const y = topY + 30 + Math.floor(i / 5) * 35;
      ctx.beginPath(); ctx.arc(x, y, 12, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(239,68,68,0.5)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x + 18, y, 12, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(239,68,68,0.5)'; ctx.fill();
    }
    ctx.fillStyle = '#fca5a5';
    ctx.fillText('O₂: ' + molesB.toFixed(1) + ' mol', w * 0.75, topY + 20);
    // Arrow
    const arrowY = h * 0.55;
    ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - 30, arrowY); ctx.lineTo(cx + 30, arrowY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 20, arrowY - 8); ctx.lineTo(cx + 30, arrowY); ctx.lineTo(cx + 20, arrowY + 8); ctx.stroke();
    ctx.font = '14px sans-serif'; ctx.fillStyle = '#64748b';
    ctx.fillText('PRODUCTS', cx, h * 0.65);
    // Product H2O
    const h2oCount = Math.min(Math.round(product * 2), 20);
    for (let i = 0; i < h2oCount; i++) {
      const x = cx - 100 + (i % 5) * 45;
      const y = h * 0.7 + Math.floor(i / 5) * 40;
      // O
      ctx.beginPath(); ctx.arc(x, y, 12, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(239,68,68,0.5)'; ctx.fill();
      // H
      ctx.beginPath(); ctx.arc(x - 14, y - 10, 7, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(59,130,246,0.5)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x + 14, y - 10, 7, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(59,130,246,0.5)'; ctx.fill();
    }
    ctx.font = '12px JetBrains Mono, monospace'; ctx.fillStyle = '#67e8f9';
    ctx.fillText('H₂O: ' + product.toFixed(1) + ' mol', cx, h * 0.68);
    // Limiting badge
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#fca5a5';
    ctx.fillText('Limiting: ' + limiting, cx, h * 0.95);
  }
  document.getElementById('sldA').addEventListener('input', e => { molesA = parseFloat(e.target.value); document.getElementById('lblA').textContent = molesA.toFixed(1); update(); draw(); });
  document.getElementById('sldB').addEventListener('input', e => { molesB = parseFloat(e.target.value); document.getElementById('lblB').textContent = molesB.toFixed(1); update(); draw(); });
  window.addEventListener('resize', draw);
  katex.render('\\frac{\\text{mol H}_2}{\\text{mol O}_2} = \\frac{2}{1}', document.getElementById('fRatio'), { displayMode: false });
  update(); draw();
})();
</script>
</body>
</html>
