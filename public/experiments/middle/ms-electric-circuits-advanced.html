<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electric Circuits — Scivra Middle School Science</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0f172a;color:#e8e6df;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
    canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px}
    .panel{background:rgba(15,23,42,0.88);border:1px solid rgba(59,130,246,0.25);border-radius:8px;padding:12px;pointer-events:all;backdrop-filter:blur(8px)}
    .top-bar{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .title-block h1{font-size:1.05rem;color:#93c5fd;font-weight:700;margin-bottom:2px}
    .title-block p{font-size:0.7rem;color:#94a3b8;max-width:280px}
    .controls{display:flex;flex-direction:column;gap:7px;min-width:260px}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
    button{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.4);color:#93c5fd;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:0.7rem;transition:all 0.2s}
    button:hover{background:rgba(59,130,246,0.25)}
    button.active{background:rgba(59,130,246,0.35);border-color:#3b82f6}
    .slider-row label{font-size:0.68rem;color:#94a3b8;display:flex;justify-content:space-between}
    .slider-row input[type=range]{width:100%;accent-color:#3b82f6;height:4px;margin-top:2px}
    .bottom-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
    .data-panel{min-width:200px}
    .data-row{display:flex;justify-content:space-between;font-size:0.68rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .data-val{color:#3b82f6;font-weight:600;font-family:'JetBrains Mono',monospace}
    .formula-panel{flex:1;max-width:400px}
    .kx{margin:3px 0;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;font-size:0.7rem}
    .badge{font-size:0.58rem;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(59,130,246,0.25);color:#93c5fd}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Electric Circuits <span class="badge">Middle School</span></h1>
      <p>Build series and parallel circuits. See how V=IR determines current and bulb brightness.</p>
    </div>
    <div class="panel controls">
      <div class="btn-row">
        <button id="btn-series" class="active" onclick="setCircuit('series')">Series Circuit</button>
        <button id="btn-parallel" onclick="setCircuit('parallel')">Parallel Circuit</button>
      </div>
      <div class="slider-row">
        <label>Battery Voltage <span id="v-val">9.0 V</span></label>
        <input type="range" id="v-slider" min="1" max="24" step="0.5" value="9" oninput="updateCircuit()">
      </div>
      <div class="slider-row">
        <label>Resistor 1 <span id="r1-val">100 ohm</span></label>
        <input type="range" id="r1-slider" min="10" max="500" step="10" value="100" oninput="updateCircuit()">
      </div>
      <div class="slider-row">
        <label>Resistor 2 <span id="r2-val">200 ohm</span></label>
        <input type="range" id="r2-slider" min="10" max="500" step="10" value="200" oninput="updateCircuit()">
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <div style="font-size:0.7rem;color:#93c5fd;margin-bottom:4px;font-weight:600">Circuit Data</div>
      <div class="data-row">Config <span class="data-val" id="d-config">Series</span></div>
      <div class="data-row">Total R <span class="data-val" id="d-rtot">300 ohm</span></div>
      <div class="data-row">Current (I) <span class="data-val" id="d-current">30.0 mA</span></div>
      <div class="data-row">Bulb 1 Power <span class="data-val" id="d-p1">0.09 W</span></div>
      <div class="data-row">Bulb 2 Power <span class="data-val" id="d-p2">0.18 W</span></div>
    </div>
    <div class="panel formula-panel">
      <div style="font-size:0.68rem;color:#93c5fd;margin-bottom:4px;font-weight:600">Ohm's Law</div>
      <div class="kx" id="kx-1"></div>
      <div class="kx" id="kx-2"></div>
    </div>
  </div>
</div>

<script>
const C=document.getElementById('canvas'),ctx=C.getContext('2d');
let W,H,circuitType='series',voltage=9,r1=100,r2=200,animT=0;
let electrons=[];

function resize(){W=C.width=innerWidth;H=C.height=innerHeight;buildElectrons()}
window.addEventListener('resize',resize);resize();

function setCircuit(t){
  circuitType=t;
  document.getElementById('btn-series').classList.toggle('active',t==='series');
  document.getElementById('btn-parallel').classList.toggle('active',t==='parallel');
  buildElectrons();updateCircuit();
}

function getCircuitValues(){
  voltage=+document.getElementById('v-slider').value;
  r1=+document.getElementById('r1-slider').value;
  r2=+document.getElementById('r2-slider').value;
  let rTot,current;
  if(circuitType==='series'){
    rTot=r1+r2;
    current=voltage/rTot;
  }else{
    rTot=1/(1/r1+1/r2);
    current=voltage/rTot;
  }
  return{rTot,current,p1:current*current*r1*(circuitType==='series'?1:(voltage/r1)*(voltage/r1)/current/current*r1>0?1:1),p2:0};
}

function updateCircuit(){
  voltage=+document.getElementById('v-slider').value;
  r1=+document.getElementById('r1-slider').value;
  r2=+document.getElementById('r2-slider').value;
  document.getElementById('v-val').textContent=voltage.toFixed(1)+' V';
  document.getElementById('r1-val').textContent=r1+' ohm';
  document.getElementById('r2-val').textContent=r2+' ohm';
  let rTot,current,i1,i2;
  if(circuitType==='series'){
    rTot=r1+r2;current=voltage/rTot;i1=current;i2=current;
  }else{
    rTot=1/(1/r1+1/r2);current=voltage/rTot;i1=voltage/r1;i2=voltage/r2;
  }
  const p1=i1*i1*r1,p2=i2*i2*r2;
  document.getElementById('d-config').textContent=circuitType==='series'?'Series':'Parallel';
  document.getElementById('d-rtot').textContent=rTot.toFixed(1)+' ohm';
  document.getElementById('d-current').textContent=(current*1000).toFixed(1)+' mA';
  document.getElementById('d-p1').textContent=p1.toFixed(3)+' W';
  document.getElementById('d-p2').textContent=p2.toFixed(3)+' W';
}

// circuit path points for electron animation
function getSeriesPath(){
  const cx=W/2,cy=H/2,pw=Math.min(400,W*0.35),ph=Math.min(250,H*0.3);
  return[
    {x:cx-pw,y:cy-ph},{x:cx-pw*0.3,y:cy-ph},{x:cx+pw*0.3,y:cy-ph},{x:cx+pw,y:cy-ph},
    {x:cx+pw,y:cy+ph},{x:cx-pw,y:cy+ph}
  ];
}

function getParallelPath(branch){
  const cx=W/2,cy=H/2,pw=Math.min(400,W*0.35),ph=Math.min(250,H*0.3);
  const off=branch===0?-ph*0.5:ph*0.5;
  return[
    {x:cx-pw,y:cy},{x:cx-pw,y:cy+off},{x:cx,y:cy+off},{x:cx+pw,y:cy+off},{x:cx+pw,y:cy}
  ];
}

function buildElectrons(){
  electrons=[];
  if(circuitType==='series'){
    for(let i=0;i<12;i++){
      electrons.push({path:'series',t:i/12,speed:0});
    }
  }else{
    for(let i=0;i<6;i++){
      electrons.push({path:'par0',t:i/6,speed:0});
      electrons.push({path:'par1',t:i/6,speed:0});
    }
  }
}

function pointOnPath(pts,t){
  const total=pts.length;
  const seg=Math.floor(t*total)%total;
  const next=(seg+1)%total;
  const frac=t*total-Math.floor(t*total);
  return{
    x:pts[seg].x+(pts[next].x-pts[seg].x)*frac,
    y:pts[seg].y+(pts[next].y-pts[seg].y)*frac
  };
}

function drawWire(pts,color){
  ctx.strokeStyle=color||'rgba(59,130,246,0.4)';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();ctx.stroke();
}

function drawBattery(x,y){
  ctx.fillStyle='#475569';ctx.fillRect(x-20,y-12,40,24);
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.strokeRect(x-20,y-12,40,24);
  ctx.fillStyle='#f87171';ctx.fillRect(x+8,y-8,8,16);
  ctx.fillStyle='#3b82f6';ctx.fillRect(x-16,y-8,8,16);
  ctx.fillStyle='#fff';ctx.font='bold 9px "JetBrains Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('+',x+12,y);ctx.fillText('-',x-12,y);
  ctx.fillStyle='#94a3b8';ctx.font='10px "JetBrains Mono",monospace';
  ctx.fillText(voltage.toFixed(1)+'V',x,y+22);
}

function drawResistor(x,y,ohms,label){
  ctx.fillStyle='#334155';ctx.fillRect(x-18,y-8,36,16);
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.strokeRect(x-18,y-8,36,16);
  // zigzag
  ctx.strokeStyle='#f97316';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-14,y);
  for(let i=0;i<5;i++){ctx.lineTo(x-14+i*6+3,y+(i%2?-5:5))}
  ctx.lineTo(x+14,y);ctx.stroke();
  ctx.fillStyle='#94a3b8';ctx.font='9px "JetBrains Mono",monospace';ctx.textAlign='center';
  ctx.fillText(ohms+'ohm',x,y+20);ctx.fillText(label,x,y-14);
}

function drawBulb(x,y,brightness){
  const b=Math.min(1,brightness*5);
  // glow
  if(b>0.05){
    const g=ctx.createRadialGradient(x,y,0,x,y,30*b);
    g.addColorStop(0,'rgba(251,191,36,'+b*0.5+')');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,30*b,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(251,191,36,'+Math.max(0.1,b)+')';
  ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();
  // filament
  ctx.strokeStyle='rgba(255,255,255,'+(0.3+b*0.7)+')';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x-5,y+5);ctx.lineTo(x,y-5);ctx.lineTo(x+5,y+5);ctx.stroke();
}

function drawSeriesCircuit(){
  const cx=W/2,cy=H/2,pw=Math.min(400,W*0.35),ph=Math.min(250,H*0.3);
  const path=getSeriesPath();
  drawWire(path);
  // battery at bottom
  drawBattery(cx,cy+ph);
  // resistors + bulbs on top wire
  const current=voltage/(r1+r2);
  drawResistor(cx-pw*0.3,cy-ph,r1,'R1');
  drawBulb(cx,cy-ph,current);
  drawResistor(cx+pw*0.3,cy-ph,r2,'R2');
  drawBulb(cx+pw*0.65,cy,current*0.8);
  // ammeter
  ctx.strokeStyle='rgba(59,130,246,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx-pw,cy,18,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#3b82f6';ctx.font='bold 9px "JetBrains Mono",monospace';ctx.textAlign='center';
  ctx.fillText('A',cx-pw,cy+3);ctx.fillStyle='#93c5fd';ctx.font='9px "JetBrains Mono",monospace';
  ctx.fillText((current*1000).toFixed(1)+'mA',cx-pw,cy+28);
  // voltmeter across R1
  ctx.strokeStyle='rgba(239,68,68,0.3)';ctx.setLineDash([3,3]);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-pw*0.3-20,cy-ph-18);ctx.lineTo(cx-pw*0.3-20,cy-ph-40);
  ctx.lineTo(cx-pw*0.3+20,cy-ph-40);ctx.lineTo(cx-pw*0.3+20,cy-ph-18);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f87171';ctx.font='9px "JetBrains Mono",monospace';
  ctx.fillText('V='+(current*r1).toFixed(2)+'V',cx-pw*0.3,cy-ph-48);
}

function drawParallelCircuit(){
  const cx=W/2,cy=H/2,pw=Math.min(400,W*0.35),ph=Math.min(250,H*0.3);
  // two branches
  const p0=getParallelPath(0),p1=getParallelPath(1);
  drawWire([{x:cx-pw,y:cy-ph},{x:cx+pw,y:cy-ph},{x:cx+pw,y:cy+ph},{x:cx-pw,y:cy+ph}],'rgba(59,130,246,0.2)');
  // top branch
  ctx.strokeStyle='rgba(59,130,246,0.4)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-pw,y=cy-ph*0.5);ctx.lineTo(cx+pw,y);ctx.stroke();
  // bottom branch
  ctx.beginPath();ctx.moveTo(cx-pw,y=cy+ph*0.5);ctx.lineTo(cx+pw,y);ctx.stroke();
  // vertical connections
  ctx.beginPath();ctx.moveTo(cx-pw,cy-ph*0.5);ctx.lineTo(cx-pw,cy+ph*0.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+pw,cy-ph*0.5);ctx.lineTo(cx+pw,cy+ph*0.5);ctx.stroke();
  // battery on left
  drawBattery(cx-pw-30,cy);
  const i1=voltage/r1,i2=voltage/r2;
  // branch 1 components
  drawResistor(cx-pw*0.3,cy-ph*0.5,r1,'R1');
  drawBulb(cx+pw*0.3,cy-ph*0.5,i1);
  // branch 2 components
  drawResistor(cx-pw*0.3,cy+ph*0.5,r2,'R2');
  drawBulb(cx+pw*0.3,cy+ph*0.5,i2);
  // current labels
  ctx.fillStyle='#93c5fd';ctx.font='9px "JetBrains Mono",monospace';ctx.textAlign='center';
  ctx.fillText('I1='+(i1*1000).toFixed(1)+'mA',cx,cy-ph*0.5-16);
  ctx.fillText('I2='+(i2*1000).toFixed(1)+'mA',cx,cy+ph*0.5-16);
  ctx.fillText('I_total='+((i1+i2)*1000).toFixed(1)+'mA',cx-pw-30,cy+36);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  if(circuitType==='series')drawSeriesCircuit();
  else drawParallelCircuit();

  // animate electrons
  let rTot=circuitType==='series'?r1+r2:1/(1/r1+1/r2);
  let current=voltage/rTot;
  let speed=Math.min(0.008,current*0.15);

  electrons.forEach(e=>{
    e.t=(e.t+speed)%1;
    let pts;
    if(e.path==='series')pts=getSeriesPath();
    else if(e.path==='par0')pts=getParallelPath(0);
    else pts=getParallelPath(1);
    const p=pointOnPath(pts,e.t);
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(251,191,36,0.3)';ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill();
  });

  animT+=0.016;
  requestAnimationFrame(draw);
}

updateCircuit();buildElectrons();
katex.render('V = I \\times R \\quad \\text{(Ohm\'s Law)}',document.getElementById('kx-1'),{throwOnError:false});
katex.render('\\text{Series: } R_T = R_1+R_2 \\quad \\text{Parallel: } \\frac{1}{R_T}=\\frac{1}{R_1}+\\frac{1}{R_2}',document.getElementById('kx-2'),{throwOnError:false});
draw();
</script>
</body>
</html>
