<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photosynthesis & Respiration — NeonPhysics Middle School</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;color:#e8e6df;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
    #canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px}
    .panel{background:rgba(10,14,26,0.85);border:1px solid rgba(34,197,94,0.35);border-radius:8px;padding:12px;pointer-events:all;backdrop-filter:blur(8px)}
    .top-bar{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .title-block h1{font-size:1.05rem;color:#86efac;font-weight:700;margin-bottom:2px}
    .title-block p{font-size:0.7rem;color:#94a3b8;max-width:260px}
    .controls{display:flex;flex-direction:column;gap:7px;min-width:220px}
    .slider-row label{font-size:0.68rem;color:#94a3b8;display:flex;justify-content:space-between}
    .slider-row input[type=range]{width:100%;accent-color:#22c55e;height:4px;margin-top:2px}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
    button{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#86efac;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:0.68rem;transition:all 0.2s}
    button:hover{background:rgba(34,197,94,0.3)}
    button.active{background:rgba(34,197,94,0.4);border-color:#22c55e}
    .bottom-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
    .data-panel{min-width:200px}
    .data-row{display:flex;justify-content:space-between;font-size:0.68rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .data-val{color:#4ade80;font-weight:600;font-family:monospace}
    .formula-panel{flex:1;max-width:440px}
    .kx{margin:3px 0;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;font-size:0.7rem}
    .badge{font-size:0.58rem;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(34,197,94,0.3);color:#86efac}
    #proc-label{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);font-size:1rem;font-weight:700;color:#86efac;text-shadow:0 0 10px rgba(34,197,94,0.6);pointer-events:none;text-align:center}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="proc-label">Photosynthesis<br><span style="font-size:0.65rem;color:#94a3b8">Light + CO₂ + H₂O → Glucose + O₂</span></div>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Photosynthesis & Respiration <span class="badge">MS Biology</span></h1>
      <p>How plants make food and how cells release energy — two complementary cycles</p>
    </div>
    <div class="panel controls">
      <div class="btn-row">
        <button id="btn-photo" class="active" onclick="setProcess('photo')">☀ Photosynthesis</button>
        <button id="btn-resp" onclick="setProcess('resp')">🔋 Respiration</button>
      </div>
      <div class="slider-row">
        <label>Light Intensity <span id="light-val">70%</span></label>
        <input type="range" id="light-slider" min="10" max="100" step="5" value="70">
      </div>
      <div class="slider-row">
        <label>CO₂ Level <span id="co2-val">400 ppm</span></label>
        <input type="range" id="co2-slider" min="100" max="1000" step="50" value="400">
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <div style="font-size:0.7rem;color:#86efac;margin-bottom:4px;font-weight:600">Process Data</div>
      <div class="data-row">Process <span class="data-val" id="d-proc">Photosynthesis</span></div>
      <div class="data-row">Location <span class="data-val" id="d-loc">Chloroplast</span></div>
      <div class="data-row">O₂ produced <span class="data-val" id="d-o2">6 mol/cycle</span></div>
      <div class="data-row">ATP yield <span class="data-val" id="d-atp">36 ATP equiv</span></div>
      <div class="data-row">Glucose <span class="data-val" id="d-gluc">+1 mol</span></div>
    </div>
    <div class="panel formula-panel">
      <div style="font-size:0.68rem;color:#86efac;margin-bottom:4px;font-weight:600">Equations</div>
      <div class="kx" id="kx-1"></div>
      <div class="kx" id="kx-2"></div>
    </div>
  </div>
</div>

<script>
let process='photo', lightInt=70, co2Level=400;
let scene,camera,renderer,leaf,cell,particles=[];

function setProcess(p){
  process=p;
  document.getElementById('btn-photo').classList.toggle('active',p==='photo');
  document.getElementById('btn-resp').classList.toggle('active',p==='resp');
  if(p==='photo'){
    document.getElementById('proc-label').innerHTML='Photosynthesis<br><span style="font-size:0.65rem;color:#94a3b8">Light + CO₂ + H₂O → Glucose + O₂</span>';
    document.getElementById('d-proc').textContent='Photosynthesis';
    document.getElementById('d-loc').textContent='Chloroplast';
    document.getElementById('d-o2').textContent='6 mol/cycle';
    document.getElementById('d-atp').textContent='—';
    document.getElementById('d-gluc').textContent='+1 mol';
  } else {
    document.getElementById('proc-label').innerHTML='Cellular Respiration<br><span style="font-size:0.65rem;color:#94a3b8">Glucose + O₂ → CO₂ + H₂O + ATP</span>';
    document.getElementById('d-proc').textContent='Respiration';
    document.getElementById('d-loc').textContent='Mitochondria';
    document.getElementById('d-o2').textContent='−6 mol/cycle';
    document.getElementById('d-atp').textContent='36-38 ATP';
    document.getElementById('d-gluc').textContent='−1 mol';
  }
  buildScene();
}

function buildScene(){
  while(scene.children.length) scene.remove(scene.children[0]);
  particles=[];
  scene.add(new THREE.AmbientLight(0xffffff,0.4));
  const dl=new THREE.DirectionalLight(0xffffff,0.8); dl.position.set(5,8,5); scene.add(dl);

  if(process==='photo'){
    // leaf shape (flattened ellipsoid)
    leaf=new THREE.Mesh(new THREE.SphereGeometry(3,24,16),new THREE.MeshStandardMaterial({color:0x15803d,roughness:0.7}));
    leaf.scale.set(1,0.2,0.6); leaf.position.y=-0.5; scene.add(leaf);
    // chloroplast bodies
    for(let i=0;i<8;i++){
      const chl=new THREE.Mesh(new THREE.SphereGeometry(0.25,10,10),new THREE.MeshStandardMaterial({color:0x16a34a,emissive:0x14532d,emissiveIntensity:0.4}));
      chl.position.set((Math.random()-0.5)*4,-0.4,(Math.random()-0.5)*1.5); scene.add(chl);
    }
    // sunlight rays
    const rayMat=new THREE.MeshBasicMaterial({color:0xfde047,transparent:true,opacity:0.15});
    for(let i=0;i<6;i++){
      const ray=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,4),rayMat);
      ray.position.set(-3+i*1.2,3,0); ray.rotation.z=0.3;
      scene.add(ray);
    }
    // CO2 particles (input, blue spheres falling down)
    for(let i=0;i<12;i++){
      const factor=co2Level/400;
      const pm=new THREE.Mesh(new THREE.SphereGeometry(0.15,8,8),new THREE.MeshStandardMaterial({color:0x94a3b8,emissive:0x475569,emissiveIntensity:0.4}));
      pm.position.set((Math.random()-0.5)*6,3+Math.random()*3,(Math.random()-0.5)*2);
      particles.push({mesh:pm,vel:new THREE.Vector3((Math.random()-0.5)*0.01,-0.02*factor,0),type:'co2'}); scene.add(pm);
    }
    // O2 output (green bubbles rising)
    for(let i=0;i<8;i++){
      const pm=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),new THREE.MeshStandardMaterial({color:0x4ade80,emissive:0x22c55e,emissiveIntensity:0.5,transparent:true,opacity:0.8}));
      pm.position.set((Math.random()-0.5)*4,-0.5,(Math.random()-0.5)*1.5);
      particles.push({mesh:pm,vel:new THREE.Vector3((Math.random()-0.5)*0.01,0.025*(lightInt/70),0),type:'o2'}); scene.add(pm);
    }
  } else {
    // mitochondria (cell)
    cell=new THREE.Mesh(new THREE.SphereGeometry(2.5,24,16),new THREE.MeshStandardMaterial({color:0x7c3aed,transparent:true,opacity:0.2}));
    scene.add(cell);
    // mitochondria organelles
    for(let i=0;i<6;i++){
      const mito=new THREE.Mesh(new THREE.SphereGeometry(0.4,12,12),new THREE.MeshStandardMaterial({color:0xc084fc,emissive:0x7c3aed,emissiveIntensity:0.5}));
      mito.scale.set(1.6,0.7,0.7);
      mito.position.set((Math.random()-0.5)*3,(Math.random()-0.5)*2,(Math.random()-0.5)*2);
      mito.rotation.z=Math.random()*Math.PI; scene.add(mito);
    }
    // glucose input (orange)
    for(let i=0;i<6;i++){
      const pm=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),new THREE.MeshStandardMaterial({color:0xf97316,emissive:0xea580c,emissiveIntensity:0.5}));
      pm.position.set(-3+(Math.random()*2),(Math.random()-0.5)*3,(Math.random()-0.5)*1.5);
      particles.push({mesh:pm,vel:new THREE.Vector3(0.025,( Math.random()-0.5)*0.01,0),type:'glucose'}); scene.add(pm);
    }
    // ATP output (yellow)
    for(let i=0;i<10;i++){
      const pm=new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8),new THREE.MeshStandardMaterial({color:0xfde047,emissive:0xeab308,emissiveIntensity:0.7}));
      pm.position.set((Math.random()-0.5)*2,(Math.random()-0.5)*2,(Math.random()-0.5)*2);
      particles.push({mesh:pm,vel:new THREE.Vector3((Math.random()-0.5)*0.04,(Math.random()-0.5)*0.04,(Math.random()-0.5)*0.02),type:'atp'}); scene.add(pm);
    }
    // CO2 exhaled (grey, exits cell)
    for(let i=0;i<8;i++){
      const pm=new THREE.Mesh(new THREE.SphereGeometry(0.15,8,8),new THREE.MeshStandardMaterial({color:0x94a3b8,transparent:true,opacity:0.7}));
      pm.position.set((Math.random()-0.5)*2,(Math.random()-0.5)*2,0);
      particles.push({mesh:pm,vel:new THREE.Vector3((Math.random()-0.5)*0.03,0.025,0),type:'co2out'}); scene.add(pm);
    }
  }
}

function initScene(){
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x0a0e1a);
  camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100); camera.position.set(0,3,14); camera.lookAt(0,0,0);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
  renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  buildScene();
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  animate();
}

let t3=0;
function animate(){
  requestAnimationFrame(animate); t3+=0.016;
  particles.forEach(p=>{
    p.mesh.position.addScaledVector(p.vel,1);
    if(p.type==='co2'){ if(p.mesh.position.y<-1.5) p.mesh.position.y=4; }
    else if(p.type==='o2'){ if(p.mesh.position.y>4) p.mesh.position.y=-1; }
    else if(p.type==='glucose'){ if(p.mesh.position.x>2.5){ p.mesh.position.x=-3.5; p.mesh.position.y=(Math.random()-0.5)*3; } }
    else if(p.type==='atp'){ if(p.mesh.position.length()>3) p.vel.multiplyScalar(-1); }
    else if(p.type==='co2out'){ if(p.mesh.position.y>3.5) p.mesh.position.set((Math.random()-0.5)*2,0,0); }
  });
  if(leaf) leaf.material.emissiveIntensity=0.05+0.05*Math.sin(t3*2);
  renderer.render(scene,camera);
}

document.getElementById('light-slider').addEventListener('input',function(){lightInt=+this.value;document.getElementById('light-val').textContent=lightInt+'%';if(process==='photo')buildScene();});
document.getElementById('co2-slider').addEventListener('input',function(){co2Level=+this.value;document.getElementById('co2-val').textContent=co2Level+' ppm';if(process==='photo')buildScene();});

katex.render('6CO_2 + 6H_2O \\xrightarrow{\\text{light}} C_6H_{12}O_6 + 6O_2', document.getElementById('kx-1'),{throwOnError:false});
katex.render('C_6H_{12}O_6 + 6O_2 \\to 6CO_2 + 6H_2O + 36\\text{ATP}', document.getElementById('kx-2'),{throwOnError:false});

initScene(); setProcess('photo');
</script>
</body>
</html>
