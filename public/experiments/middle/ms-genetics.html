<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genetics & Heredity — NeonPhysics Middle School</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;color:#e8e6df;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
    #canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px}
    .panel{background:rgba(10,14,26,0.85);border:1px solid rgba(249,115,22,0.35);border-radius:8px;padding:12px;pointer-events:all;backdrop-filter:blur(8px)}
    .top-bar{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .title-block h1{font-size:1.05rem;color:#fdba74;font-weight:700;margin-bottom:2px}
    .title-block p{font-size:0.7rem;color:#94a3b8;max-width:260px}
    .controls{display:flex;flex-direction:column;gap:7px;min-width:240px}
    .gene-row{display:flex;gap:8px;align-items:center;font-size:0.68rem;color:#94a3b8}
    .gene-sel{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.4);color:#fdba74;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:0.68rem}
    .gene-sel.active{background:rgba(249,115,22,0.4)}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
    button{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.4);color:#fdba74;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:0.68rem;transition:all 0.2s}
    button:hover{background:rgba(249,115,22,0.3)}
    button.active{background:rgba(249,115,22,0.4);border-color:#f97316}
    .bottom-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
    .data-panel{min-width:210px}
    .data-row{display:flex;justify-content:space-between;font-size:0.68rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .data-val{color:#fb923c;font-weight:600;font-family:monospace}
    .formula-panel{flex:1;max-width:400px}
    .kx{margin:3px 0;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;font-size:0.7rem}
    .badge{font-size:0.58rem;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(249,115,22,0.3);color:#fdba74}
    #punnett{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:30px 70px 70px;grid-template-rows:30px 70px 70px;gap:3px;pointer-events:none}
    .pun-cell{display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:0.9rem;font-weight:700}
    .pun-header{color:#fdba74;font-size:0.75rem}
    .pun-dom{background:rgba(249,115,22,0.35);color:#fdba74}
    .pun-rec{background:rgba(30,41,59,0.7);color:#94a3b8;border:1px solid rgba(249,115,22,0.2)}
    .pun-het{background:rgba(249,115,22,0.2);color:#fdba74;border:1px solid rgba(249,115,22,0.3)}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="punnett">
  <div class="pun-cell"></div>
  <div class="pun-cell pun-header" id="ph0"></div>
  <div class="pun-cell pun-header" id="ph1"></div>
  <div class="pun-cell pun-header" id="pm0"></div>
  <div class="pun-cell" id="p00"></div>
  <div class="pun-cell" id="p01"></div>
  <div class="pun-cell pun-header" id="pm1"></div>
  <div class="pun-cell" id="p10"></div>
  <div class="pun-cell" id="p11"></div>
</div>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Genetics & Heredity <span class="badge">MS Biology</span></h1>
      <p>Punnett squares, dominant/recessive traits, and probability of inheritance</p>
    </div>
    <div class="panel controls">
      <div class="gene-row">
        <span>Parent 1:</span>
        <button class="gene-sel active" id="p1-dom" onclick="setP1('dom')">Dominant (AA)</button>
        <button class="gene-sel" id="p1-het" onclick="setP1('het')">Hetero (Aa)</button>
        <button class="gene-sel" id="p1-rec" onclick="setP1('rec')">Recessive (aa)</button>
      </div>
      <div class="gene-row">
        <span>Parent 2:</span>
        <button class="gene-sel active" id="p2-dom" onclick="setP2('dom')">Dominant (AA)</button>
        <button class="gene-sel" id="p2-het" onclick="setP2('het')">Hetero (Aa)</button>
        <button class="gene-sel" id="p2-rec" onclick="setP2('rec')">Recessive (aa)</button>
      </div>
      <div class="btn-row">
        <button onclick="runCross()">▶ Run Cross</button>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <div style="font-size:0.7rem;color:#fdba74;margin-bottom:4px;font-weight:600">Punnett Results</div>
      <div class="data-row">Parent 1 Genotype <span class="data-val" id="d-p1">AA</span></div>
      <div class="data-row">Parent 2 Genotype <span class="data-val" id="d-p2">AA</span></div>
      <div class="data-row">Dominant Pheno % <span class="data-val" id="d-dom">100%</span></div>
      <div class="data-row">Recessive Pheno % <span class="data-val" id="d-rec">0%</span></div>
      <div class="data-row">Genotype Ratio <span class="data-val" id="d-ratio">AA:Aa:aa</span></div>
    </div>
    <div class="panel formula-panel">
      <div style="font-size:0.68rem;color:#fdba74;margin-bottom:4px;font-weight:600">Mendel's Laws</div>
      <div class="kx" id="kx-1"></div>
      <div class="kx" id="kx-2"></div>
    </div>
  </div>
</div>

<script>
let p1='dom', p2='dom';
let scene,camera,renderer,dnaStrands=[];

const genoMap={dom:['A','A'],het:['A','a'],rec:['a','a']};

function setP1(g){ p1=g; ['dom','het','rec'].forEach(x=>document.getElementById('p1-'+x).classList.toggle('active',x===g)); updatePunnett(); }
function setP2(g){ p2=g; ['dom','het','rec'].forEach(x=>document.getElementById('p2-'+x).classList.toggle('active',x===g)); updatePunnett(); }

function updatePunnett(){
  const g1=genoMap[p1], g2=genoMap[p2];
  document.getElementById('d-p1').textContent=g1.join('');
  document.getElementById('d-p2').textContent=g2.join('');
  // header
  document.getElementById('ph0').textContent=g1[0];
  document.getElementById('ph1').textContent=g1[1];
  document.getElementById('pm0').textContent=g2[0];
  document.getElementById('pm1').textContent=g2[1];
  // cells
  const combos=[[g1[0]+g2[0],p00],[g1[1]+g2[0],p01],[g1[0]+g2[1],p10],[g1[1]+g2[1],p11]];
  const ids=['p00','p01','p10','p11'];
  let domCount=0, recCount=0;
  const genoCount={};
  combos.forEach(([combo,_],i)=>{
    const sorted=combo.split('').sort((a,b)=>a.localeCompare(b)).join('').replace('aA','Aa');
    const norm=sorted[0]==='A'?sorted[0].toUpperCase()+sorted[1]:sorted;
    const isDom=sorted.toUpperCase()!==sorted.toLowerCase() || sorted==='AA';
    const isRec=sorted==='aa';
    const el=document.getElementById(ids[i]);
    el.textContent=norm;
    el.className='pun-cell '+(isRec?'pun-rec':norm==='AA'?'pun-dom':'pun-het');
    if(isRec) recCount++; else domCount++;
    genoCount[norm]=(genoCount[norm]||0)+1;
  });
  document.getElementById('d-dom').textContent=(domCount/4*100).toFixed(0)+'%';
  document.getElementById('d-rec').textContent=(recCount/4*100).toFixed(0)+'%';
  document.getElementById('d-ratio').textContent=Object.entries(genoCount).map(([k,v])=>v+'×'+k).join(' : ');
  buildScene();
}

function runCross(){
  // flash animation
  ['p00','p01','p10','p11'].forEach((id,i)=>{
    const el=document.getElementById(id);
    setTimeout(()=>{el.style.transform='scale(1.15)'; setTimeout(()=>{el.style.transform='';},300);},i*100);
  });
}

function buildScene(){
  while(scene.children.length) scene.remove(scene.children[0]);
  dnaStrands=[];
  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const dl=new THREE.DirectionalLight(0xffffff,0.8); dl.position.set(5,8,5); scene.add(dl);
  const pl=new THREE.PointLight(0xf97316,0.5,15); pl.position.set(0,3,3); scene.add(pl);
  // DNA double helix background
  const g1=genoMap[p1], g2=genoMap[p2];
  const isDom=(a)=>a==='A';
  drawDNA(-5, g1, 'left');
  drawDNA(5, g2, 'right');
}

function drawDNA(xOff, genes, side){
  const col1=isDom(genes[0])?0xf97316:0x64748b;
  const col2=isDom(genes[1])?0xf97316:0x64748b;
  for(let i=0;i<20;i++){
    const t=i/20*Math.PI*4;
    const r=0.8;
    const y=-3+i*0.3;
    const x1=xOff+Math.cos(t)*r, x2=xOff+Math.cos(t+Math.PI)*r;
    const z1=Math.sin(t)*r, z2=Math.sin(t+Math.PI)*r;
    const s1=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),new THREE.MeshStandardMaterial({color:col1,emissive:col1,emissiveIntensity:0.3}));
    s1.position.set(x1,y,z1); scene.add(s1);
    const s2=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),new THREE.MeshStandardMaterial({color:col2,emissive:col2,emissiveIntensity:0.3}));
    s2.position.set(x2,y,z2); scene.add(s2);
    // rung
    const rungLen=Math.sqrt((x2-x1)**2+(z2-z1)**2);
    const rung=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,rungLen,6),new THREE.MeshBasicMaterial({color:0x374151}));
    rung.position.set((x1+x2)/2,y,(z1+z2)/2);
    rung.rotation.z=Math.PI/2; rung.lookAt(x2,y,z2);
    scene.add(rung);
    dnaStrands.push({s1,s2,angle:t,xOff,r,y,col1,col2});
  }
}

function isDom(a){ return a==='A'; }

function initScene(){
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x0a0e1a);
  camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100); camera.position.set(0,0,16); camera.lookAt(0,0,0);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
  renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  buildScene();
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  animate();
}

let t3=0;
function animate(){
  requestAnimationFrame(animate); t3+=0.016;
  // slowly rotate view
  camera.position.x=Math.sin(t3*0.1)*2;
  camera.position.y=Math.sin(t3*0.07)*1;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}

katex.render('\\text{Dominant (A) masks Recessive (a)} \\quad AA,\\,Aa = \\text{dominant phenotype}', document.getElementById('kx-1'),{throwOnError:false});
katex.render('P(\\text{recessive}) = \\left(\\frac{1}{2}\\right)^2 = 25\\% \\text{ for Aa × Aa}', document.getElementById('kx-2'),{throwOnError:false});

initScene(); updatePunnett();
</script>
</body>
</html>
