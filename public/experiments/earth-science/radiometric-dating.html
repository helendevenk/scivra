<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiometric Dating — Scivra Earth Science</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }
    .data-val { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    canvas { position: absolute; top: 0; left: 0; }
    #ui {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none; padding: 12px;
    }
    .panel {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 8px;
      padding: 12px 14px;
      pointer-events: all;
      backdrop-filter: blur(10px);
    }
    .top-bar { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
    .bottom-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    h1 { font-size: 1.05rem; font-weight: 600; margin-bottom: 2px; }
    .badge {
      font-size: 0.6rem; background: rgba(249,115,22,0.18);
      color: #fed7aa; padding: 2px 7px; border-radius: 10px;
      vertical-align: middle; margin-left: 6px;
    }
    .subtitle { font-size: 0.7rem; color: #94a3b8; }
    button {
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.25);
      color: #fed7aa; padding: 5px 10px; border-radius: 5px;
      cursor: pointer; font-size: 0.72rem; transition: all 0.2s;
    }
    button:hover { background: rgba(249,115,22,0.25); }
    button.active { background: rgba(249,115,22,0.35); border-color: #f97316; }
    select {
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.25);
      color: #fed7aa; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem;
    }
    select option { background: #1e293b; color: #e2e8f0; }
    .info-row { font-size: 0.68rem; color: #94a3b8; margin: 3px 0; }
    .info-row .data-val { color: #fed7aa; }
    .panel-title { font-size: 0.7rem; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
    .formula-panel { max-width: 380px; }
    .formula-desc { font-size: 0.62rem; color: #94a3b8; margin-bottom: 6px; }
    .ctrl-row { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
    .slider-group { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: #94a3b8; }
    .slider-group input[type="range"] { width: 80px; accent-color: #f97316; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel">
      <h1>Radiometric Dating <span class="badge">Earth Science</span></h1>
      <p class="subtitle">Exponential decay and half-life in geological dating</p>
    </div>
    <div class="panel">
      <label style="font-size:0.68rem;color:#94a3b8;">Isotope:</label>
      <select id="isotopeSelect"></select>
      <div class="ctrl-row">
        <button id="btnStart">Start Decay</button>
        <button id="btnReset">Reset</button>
        <div class="slider-group">
          Speed: <input type="range" id="speedSlider" min="1" max="10" value="3">
          <span class="data-val" id="speedVal">3x</span>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel" style="min-width:200px;">
      <div class="panel-title">Sample Data</div>
      <div class="info-row">Half-life: <span class="data-val" id="infoHalfLife">—</span></div>
      <div class="info-row">Elapsed: <span class="data-val" id="infoElapsed">—</span></div>
      <div class="info-row">Parent remaining: <span class="data-val" id="infoParent">—</span></div>
      <div class="info-row">Daughter produced: <span class="data-val" id="infoDaughter">—</span></div>
      <div class="info-row">Calculated age: <span class="data-val" id="infoAge">—</span></div>
    </div>
    <div class="panel formula-panel">
      <div class="panel-title">Decay Law</div>
      <div id="formulaDisplay"></div>
    </div>
  </div>
</div>

<script>
const ISOTOPES = [
  { name: "C-14 → N-14", halfLife: 5730, unit: "years", maxTime: 40000, color: "#f97316" },
  { name: "K-40 → Ar-40", halfLife: 1.25e9, unit: "billion years", maxTime: 5e9, color: "#fb923c" },
  { name: "U-238 → Pb-206", halfLife: 4.47e9, unit: "billion years", maxTime: 20e9, color: "#fdba74" },
  { name: "Rb-87 → Sr-87", halfLife: 48.8e9, unit: "billion years", maxTime: 200e9, color: "#fed7aa" }
];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let atoms = [];
let running = false;
let simTime = 0;
let currentIsotope = 0;
let speed = 3;
let initialCount = 200;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function formatTime(t, iso) {
  if (iso.halfLife >= 1e9) return (t / 1e9).toFixed(2) + " Ga";
  if (iso.halfLife >= 1e6) return (t / 1e6).toFixed(1) + " Ma";
  return Math.round(t).toLocaleString() + " yr";
}

function initAtoms() {
  atoms = [];
  const area = W * H;
  const gridSize = Math.max(12, Math.sqrt(area / initialCount) * 0.6);
  const cols = Math.floor((W * 0.55) / gridSize);
  const rows = Math.ceil(initialCount / cols);
  const startX = W * 0.05;
  const startY = H * 0.2;
  for (let i = 0; i < initialCount; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    atoms.push({
      x: startX + col * gridSize + (Math.random() - 0.5) * 4,
      y: startY + row * gridSize + (Math.random() - 0.5) * 4,
      parent: true,
      decayTime: -ISOTOPES[currentIsotope].halfLife * Math.log(Math.random()) / Math.LN2
    });
  }
  atoms.sort((a, b) => a.decayTime - b.decayTime);
}

function updateInfo() {
  const iso = ISOTOPES[currentIsotope];
  const parentCount = atoms.filter(a => a.parent).length;
  const daughterCount = initialCount - parentCount;
  const fraction = parentCount / initialCount;
  const calcAge = fraction > 0 && fraction < 1
    ? iso.halfLife * Math.log(initialCount / parentCount) / Math.LN2
    : 0;

  document.getElementById('infoHalfLife').textContent = formatTime(iso.halfLife, iso);
  document.getElementById('infoElapsed').textContent = formatTime(simTime, iso);
  document.getElementById('infoParent').textContent = `${parentCount} (${(fraction * 100).toFixed(1)}%)`;
  document.getElementById('infoDaughter').textContent = `${daughterCount}`;
  document.getElementById('infoAge').textContent = calcAge > 0 ? formatTime(calcAge, iso) : "—";
}

function drawDecayCurve() {
  const iso = ISOTOPES[currentIsotope];
  const cx = W * 0.62, cy = H * 0.15;
  const cw = W * 0.35, ch = H * 0.55;

  // Background
  ctx.fillStyle = 'rgba(15, 23, 42, 0.6)';
  ctx.strokeStyle = 'rgba(249,115,22,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(cx - 10, cy - 10, cw + 20, ch + 40, 8);
  ctx.fill();
  ctx.stroke();

  // Axes
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + ch);
  ctx.lineTo(cx + cw, cy + ch);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Time →', cx + cw / 2, cy + ch + 28);
  ctx.save();
  ctx.translate(cx - 18, cy + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('% Parent', 0, 0);
  ctx.restore();

  // Y-axis ticks
  ctx.textAlign = 'right';
  ctx.font = '10px monospace';
  for (let p = 0; p <= 100; p += 25) {
    const y = cy + ch - (p / 100) * ch;
    ctx.fillStyle = '#64748b';
    ctx.fillText(p + '%', cx - 5, y + 3);
    ctx.strokeStyle = 'rgba(100,116,139,0.15)';
    ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx + cw, y); ctx.stroke();
  }

  // Half-life markers
  const maxHL = 6;
  ctx.textAlign = 'center';
  for (let hl = 1; hl <= maxHL; hl++) {
    const x = cx + (hl / maxHL) * cw;
    ctx.strokeStyle = 'rgba(249,115,22,0.2)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(x, cy + ch); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '9px monospace';
    ctx.fillText(hl + 't½', x, cy + ch + 14);
  }

  // Theoretical curve
  ctx.strokeStyle = 'rgba(249,115,22,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let px = 0; px <= cw; px++) {
    const t = (px / cw) * maxHL;
    const frac = Math.pow(0.5, t);
    const x = cx + px;
    const y = cy + ch - frac * ch;
    if (px === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Current time marker
  const tHL = simTime / iso.halfLife;
  if (tHL <= maxHL) {
    const mx = cx + (tHL / maxHL) * cw;
    const frac = Math.pow(0.5, tHL);
    const my = cy + ch - frac * ch;
    ctx.fillStyle = '#f97316';
    ctx.beginPath();
    ctx.arc(mx, my, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, W, H);

  // Draw atoms
  const r = Math.max(4, Math.min(8, Math.sqrt(W * H / initialCount) * 0.2));
  atoms.forEach(a => {
    ctx.fillStyle = a.parent ? '#f97316' : '#3b82f6';
    ctx.beginPath();
    ctx.arc(a.x, a.y, r, 0, Math.PI * 2);
    ctx.fill();
    if (a.parent) {
      ctx.strokeStyle = 'rgba(249,115,22,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(a.x, a.y, r + 2, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  // Legend
  const lx = W * 0.05, ly = H * 0.12;
  ctx.font = '11px system-ui';
  ctx.fillStyle = '#f97316';
  ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'left';
  ctx.fillText('Parent', lx + 10, ly + 4);
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath(); ctx.arc(lx + 70, ly, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('Daughter', lx + 80, ly + 4);

  drawDecayCurve();
  updateInfo();
}

let lastTime = 0;
function animate(ts) {
  if (running) {
    const dt = (ts - lastTime) / 1000;
    const iso = ISOTOPES[currentIsotope];
    const timeStep = iso.maxTime / 300 * speed * dt;
    simTime += timeStep;

    atoms.forEach(a => {
      if (a.parent && simTime >= a.decayTime) {
        a.parent = false;
      }
    });
  }
  lastTime = ts;
  draw();
  requestAnimationFrame(animate);
}

// Controls
const select = document.getElementById('isotopeSelect');
ISOTOPES.forEach((iso, i) => {
  const opt = document.createElement('option');
  opt.value = i; opt.textContent = iso.name;
  select.appendChild(opt);
});
select.addEventListener('change', () => {
  currentIsotope = parseInt(select.value);
  resetSim();
});

document.getElementById('btnStart').addEventListener('click', function() {
  running = !running;
  this.textContent = running ? 'Pause' : 'Start Decay';
  this.classList.toggle('active', running);
});

document.getElementById('btnReset').addEventListener('click', resetSim);

const speedSlider = document.getElementById('speedSlider');
speedSlider.addEventListener('input', () => {
  speed = parseInt(speedSlider.value);
  document.getElementById('speedVal').textContent = speed + 'x';
});

function resetSim() {
  running = false;
  simTime = 0;
  document.getElementById('btnStart').textContent = 'Start Decay';
  document.getElementById('btnStart').classList.remove('active');
  initAtoms();
  draw();
}

function renderFormulas() {
  const el = document.getElementById('formulaDisplay');
  el.innerHTML = '';
  const formulas = [
    { tex: 'N(t) = N_0 \\left(\\frac{1}{2}\\right)^{t/t_{1/2}}', desc: 'Atoms remaining after time t' },
    { tex: 't = t_{1/2} \\cdot \\frac{\\ln(N_0/N)}{\\ln 2}', desc: 'Calculate age from ratio' }
  ];
  formulas.forEach(f => {
    const div = document.createElement('div');
    try { katex.render(f.tex, div, { displayMode: false, throwOnError: false }); }
    catch { div.textContent = f.tex; }
    el.appendChild(div);
    const desc = document.createElement('div');
    desc.className = 'formula-desc'; desc.textContent = f.desc;
    el.appendChild(desc);
  });
}

initAtoms();
renderFormulas();
requestAnimationFrame(animate);
</script>
</body>
</html>
