<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound & Vibration — Scivra K-5 Physics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:rgba(30,41,59,0.95);border-right:1px solid rgba(59,130,246,0.25);padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.badge-row{display:flex;gap:8px}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.badge-subject{background:rgba(59,130,246,0.25);color:#93c5fd;border:1px solid rgba(59,130,246,0.4)}
.badge-free{background:rgba(34,197,94,0.2);color:#86efac;border:1px solid rgba(34,197,94,0.3)}
.sidebar h1{font-size:1.2em;color:#3b82f6;line-height:1.3}
.sidebar h1 span{color:#93c5fd;font-size:0.7em;display:block;margin-top:2px}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:13px;color:#93c5fd;font-weight:600}
.control-group select,.control-group input[type=range]{width:100%;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;outline:none}
.control-group input[type=range]{-webkit-appearance:none;height:6px;padding:0;cursor:pointer}
.control-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#3b82f6;border-radius:50%;cursor:pointer}
.val{font-family:'JetBrains Mono',monospace;color:#93c5fd;font-size:12px;text-align:right}
.info-box{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:8px;padding:12px;font-size:13px;line-height:1.5}
.info-box h3{color:#3b82f6;font-size:14px;margin-bottom:6px}
.data-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(59,130,246,0.1)}
.data-label{color:#94a3b8;font-size:12px}
.data-val{font-family:'JetBrains Mono',monospace;color:#93c5fd;font-size:13px;font-weight:600}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
canvas{border-radius:12px;background:#0f172a;display:block}
</style>
</head>
<body>
<div class="sidebar">
    <div class="badge-row">
        <span class="badge badge-subject">K-5 PHYSICS</span>
        <span class="badge badge-free">FREE</span>
    </div>
    <h1>Sound & Vibration<span>Scivra K-5 Physics</span></h1>

    <div class="control-group">
        <label>Frequency (Hz)</label>
        <input type="range" id="frequency" min="1" max="20" value="5" step="0.5">
        <div class="val" id="freqVal">5.0 Hz</div>
    </div>

    <div class="control-group">
        <label>Amplitude</label>
        <input type="range" id="amplitude" min="10" max="80" value="40">
        <div class="val" id="ampVal">40</div>
    </div>

    <div class="control-group">
        <label>Medium</label>
        <select id="medium">
            <option value="air">Air (343 m/s)</option>
            <option value="water">Water (1,480 m/s)</option>
            <option value="steel">Steel (5,960 m/s)</option>
        </select>
    </div>

    <div class="info-box">
        <h3>Wave Data</h3>
        <div class="data-row"><span class="data-label">Speed</span><span class="data-val" id="speedVal">343 m/s</span></div>
        <div class="data-row"><span class="data-label">Wavelength</span><span class="data-val" id="waveVal">—</span></div>
        <div class="data-row"><span class="data-label">Period</span><span class="data-val" id="periodVal">—</span></div>
    </div>

    <div class="info-box">
        <h3>Fun Fact</h3>
        <p id="funFact">Sound travels about 4x faster in water than in air because water molecules are closer together!</p>
    </div>

    <div class="info-box">
        <h3>Speed Comparison</h3>
        <div id="speedBars" style="margin-top:8px">
            <div style="margin-bottom:6px">
                <div style="font-size:11px;color:#94a3b8">Air</div>
                <div style="background:rgba(59,130,246,0.2);border-radius:3px;height:8px;overflow:hidden">
                    <div id="barAir" style="height:100%;background:#3b82f6;border-radius:3px;width:6%;transition:all 0.3s"></div>
                </div>
            </div>
            <div style="margin-bottom:6px">
                <div style="font-size:11px;color:#94a3b8">Water</div>
                <div style="background:rgba(59,130,246,0.2);border-radius:3px;height:8px;overflow:hidden">
                    <div id="barWater" style="height:100%;background:#60a5fa;border-radius:3px;width:25%;transition:all 0.3s"></div>
                </div>
            </div>
            <div>
                <div style="font-size:11px;color:#94a3b8">Steel</div>
                <div style="background:rgba(59,130,246,0.2);border-radius:3px;height:8px;overflow:hidden">
                    <div id="barSteel" style="height:100%;background:#93c5fd;border-radius:3px;width:100%;transition:all 0.3s"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="canvas-area">
    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const freqSlider = document.getElementById('frequency');
const ampSlider = document.getElementById('amplitude');
const mediumSelect = document.getElementById('medium');

const speeds = { air: 343, water: 1480, steel: 5960 };
const facts = {
    air: 'Sound travels about 4x faster in water than in air because water molecules are closer together!',
    water: 'Whales can hear each other from hundreds of miles away through ocean water!',
    steel: 'You can hear a train coming by putting your ear on the steel rail — sound travels 17x faster in steel!'
};

let W, H, time = 0;

function resize() {
    const area = canvas.parentElement;
    W = area.clientWidth - 40;
    H = area.clientHeight - 40;
    canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

function updateUI() {
    const freq = +freqSlider.value;
    const amp = +ampSlider.value;
    const med = mediumSelect.value;
    const speed = speeds[med];

    document.getElementById('freqVal').textContent = freq.toFixed(1) + ' Hz';
    document.getElementById('ampVal').textContent = amp;
    document.getElementById('speedVal').textContent = speed.toLocaleString() + ' m/s';
    document.getElementById('waveVal').textContent = (speed / freq).toFixed(1) + ' m';
    document.getElementById('periodVal').textContent = (1 / freq).toFixed(3) + ' s';
    document.getElementById('funFact').textContent = facts[med];

    const maxSpeed = 5960;
    document.getElementById('barAir').style.width = (343 / maxSpeed * 100) + '%';
    document.getElementById('barWater').style.width = (1480 / maxSpeed * 100) + '%';
    document.getElementById('barSteel').style.width = '100%';

    const active = med;
    document.getElementById('barAir').style.background = active === 'air' ? '#3b82f6' : 'rgba(59,130,246,0.3)';
    document.getElementById('barWater').style.background = active === 'water' ? '#60a5fa' : 'rgba(59,130,246,0.3)';
    document.getElementById('barSteel').style.background = active === 'steel' ? '#93c5fd' : 'rgba(59,130,246,0.3)';
}

function drawVibrator(t) {
    const centerY = H / 2;
    const x = 60;
    const vibAmp = +ampSlider.value * 0.5;
    const freq = +freqSlider.value;
    const offset = Math.sin(t * freq * 2) * vibAmp;

    // speaker body
    ctx.fillStyle = 'rgba(59,130,246,0.3)';
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(x - 20, centerY - 50, 40, 100, 8);
    ctx.fill();
    ctx.stroke();

    // vibrating membrane
    ctx.strokeStyle = '#93c5fd';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x + 20, centerY - 35);
    ctx.quadraticCurveTo(x + 20 + offset * 0.3, centerY, x + 20, centerY + 35);
    ctx.stroke();

    // vibration lines
    for (let i = 1; i <= 3; i++) {
        const alpha = Math.max(0, 1 - i * 0.3) * Math.abs(Math.sin(t * freq * 2 + i * 0.5));
        ctx.strokeStyle = `rgba(147,197,253,${alpha * 0.5})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(x + 25, centerY, 15 + i * 10, -0.5, 0.5);
        ctx.stroke();
    }

    return x + 40;
}

function drawWave(startX, t) {
    const centerY = H / 2;
    const freq = +freqSlider.value;
    const amp = +ampSlider.value;
    const med = mediumSelect.value;
    const speed = speeds[med];
    const speedFactor = speed / 343;
    const wavelength = (W - startX - 40) / (freq * 0.8);

    // wave
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 3;
    ctx.beginPath();
    let started = false;

    for (let x = startX; x < W - 30; x++) {
        const dx = x - startX;
        const fadeIn = Math.min(1, dx / 40);
        const phase = (dx / wavelength) * Math.PI * 2 - t * freq * speedFactor * 0.5;
        const y = centerY + Math.sin(phase) * amp * fadeIn;
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // glow wave
    ctx.strokeStyle = 'rgba(59,130,246,0.15)';
    ctx.lineWidth = 12;
    ctx.beginPath();
    started = false;
    for (let x = startX; x < W - 30; x++) {
        const dx = x - startX;
        const fadeIn = Math.min(1, dx / 40);
        const phase = (dx / wavelength) * Math.PI * 2 - t * freq * speedFactor * 0.5;
        const y = centerY + Math.sin(phase) * amp * fadeIn;
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // air particle dots
    ctx.fillStyle = 'rgba(147,197,253,0.4)';
    for (let x = startX + 20; x < W - 30; x += wavelength / 4) {
        const dx = x - startX;
        const fadeIn = Math.min(1, dx / 40);
        const phase = (dx / wavelength) * Math.PI * 2 - t * freq * speedFactor * 0.5;
        const offsetX = Math.cos(phase) * 8;
        const py = centerY + Math.sin(phase) * amp * fadeIn;
        for (let row = -2; row <= 2; row++) {
            if (row === 0) continue;
            const ry = centerY + row * 25;
            const compression = 1 + Math.cos(phase) * 0.3;
            ctx.beginPath();
            ctx.arc(x + offsetX, ry, 2 * compression, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // wavelength bracket
    const bracketY = centerY + amp + 30;
    const wx1 = startX + 60;
    const wx2 = wx1 + wavelength;
    if (wx2 < W - 40) {
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(wx1, bracketY - 5); ctx.lineTo(wx1, bracketY + 5);
        ctx.moveTo(wx1, bracketY); ctx.lineTo(wx2, bracketY);
        ctx.moveTo(wx2, bracketY - 5); ctx.lineTo(wx2, bracketY + 5);
        ctx.stroke();
        ctx.fillStyle = '#fbbf24';
        ctx.font = "bold 12px 'JetBrains Mono'";
        ctx.textAlign = 'center';
        ctx.fillText('wavelength', (wx1 + wx2) / 2, bracketY + 18);
    }

    // amplitude bracket
    const ampX = startX + 60;
    ctx.strokeStyle = '#f87171';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(ampX, centerY); ctx.lineTo(ampX, centerY - amp);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#f87171';
    ctx.font = "11px 'JetBrains Mono'";
    ctx.textAlign = 'left';
    ctx.fillText('amp', ampX + 5, centerY - amp / 2);

    // center line
    ctx.strokeStyle = 'rgba(148,163,184,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(startX, centerY);
    ctx.lineTo(W - 30, centerY);
    ctx.stroke();
    ctx.setLineDash([]);

    // ear icon at right
    ctx.font = "28px serif";
    ctx.textAlign = 'center';
    ctx.fillText('👂', W - 20, centerY + 8);
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    time += 0.016;

    ctx.font = "bold 15px 'Segoe UI'";
    ctx.fillStyle = 'rgba(147,197,253,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText('Sound Wave Propagation', W / 2, 25);
    ctx.textAlign = 'start';

    const waveStart = drawVibrator(time);
    drawWave(waveStart, time);

    requestAnimationFrame(draw);
}

freqSlider.addEventListener('input', updateUI);
ampSlider.addEventListener('input', updateUI);
mediumSelect.addEventListener('change', updateUI);

updateUI();
draw();
</script>
</body>
</html>
