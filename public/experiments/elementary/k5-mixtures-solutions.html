<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixtures & Solutions — Scivra Elementary Science</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; user-select: none; }
    .data-val { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; padding: 10px; z-index: 10; }
    .top-bar { display: flex; gap: 10px; flex-wrap: wrap; }
    .bottom-bar { display: flex; gap: 10px; flex-wrap: wrap; }
    .panel { background: rgba(15, 23, 42, 0.88); border: 1px solid rgba(16,185,129,0.25); border-radius: 8px; padding: 12px 14px; pointer-events: all; backdrop-filter: blur(10px); }
    .title-block h1 { font-size: 1rem; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
    .title-block p { font-size: 0.7rem; color: #94a3b8; }
    .badge { background: rgba(16,185,129,0.15); color: #10b981; padding: 2px 8px; border-radius: 9999px; font-size: 0.6rem; font-weight: 600; }
    .controls { display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
    .control-row { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; }
    .control-row label { color: #94a3b8; min-width: 60px; }
    select, button { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; padding: 4px 8px; border-radius: 5px; font-size: 0.72rem; cursor: pointer; }
    button { padding: 6px 14px; font-weight: 600; font-size: 0.8rem; transition: all 0.2s; }
    button:hover { background: rgba(16,185,129,0.3); }
    button.active { background: rgba(16,185,129,0.35); box-shadow: 0 0 8px rgba(16,185,129,0.3); }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .data-panel h3 { font-size: 0.75rem; color: #10b981; margin-bottom: 6px; }
    .data-row { font-size: 0.7rem; margin-bottom: 3px; display: flex; gap: 6px; }
    .data-row .lbl { color: #94a3b8; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Mixtures & Solutions <span class="badge">Elementary</span></h1>
      <p>Mix substances in a beaker and see if they dissolve or separate!</p>
    </div>
    <div class="panel controls">
      <div class="control-row">
        <label>Mixture:</label>
        <select id="mixture">
          <option value="0">Sand + Water</option>
          <option value="1">Salt + Water</option>
          <option value="2">Oil + Water</option>
        </select>
      </div>
      <div class="btn-row">
        <button id="btnMix">Mix It!</button>
        <button id="btnSeparate">Separate</button>
        <button id="btnReset">Reset</button>
      </div>
    </div>
    <div class="panel controls">
      <div class="control-row"><label>Method:</label></div>
      <div class="btn-row">
        <button id="mFilter" class="method-btn">Filter</button>
        <button id="mEvap" class="method-btn">Evaporate</button>
        <button id="mSettle" class="method-btn">Let Settle</button>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <h3>Observation</h3>
      <div class="data-row"><span class="lbl">Type:</span> <span class="data-val" id="dType">—</span></div>
      <div class="data-row"><span class="lbl">Dissolves?</span> <span class="data-val" id="dDissolve">—</span></div>
      <div class="data-row"><span class="lbl">Method:</span> <span class="data-val" id="dMethod">—</span></div>
    </div>
    <div class="panel data-panel">
      <h3>Status</h3>
      <div class="data-row"><span class="lbl">Phase:</span> <span class="data-val" id="dPhase">Ready</span></div>
      <div class="data-row"><span class="lbl">Particles:</span> <span class="data-val" id="dCount">0</span></div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const MIXTURES = [
    { name: 'Sand + Water', dissolves: false, solidColor: '#d4a373', liquidColor: 'rgba(59,130,246,0.3)', type: 'Heterogeneous Mixture', method: 'Filter or Let Settle', particleSize: 5 },
    { name: 'Salt + Water', dissolves: true, solidColor: '#e2e8f0', liquidColor: 'rgba(59,130,246,0.25)', type: 'Solution (Homogeneous)', method: 'Evaporate', particleSize: 2 },
    { name: 'Oil + Water', dissolves: false, solidColor: '#fbbf24', liquidColor: 'rgba(59,130,246,0.3)', type: 'Heterogeneous Mixture', method: 'Let Settle', particleSize: 7 }
  ];

  let particles = [];
  let state = { phase: 'ready', mixIdx: 0, separating: false, sepMethod: '', mixTime: 0, sepTime: 0 };

  function createParticles() {
    const m = MIXTURES[state.mixIdx];
    particles = [];
    const cx = canvas.width / 2, cy = canvas.height / 2 + 40;
    for (let i = 0; i < 60; i++) {
      particles.push({
        x: cx + (Math.random() - 0.5) * 140,
        y: cy - 80 + Math.random() * 30,
        vx: 0, vy: 0,
        size: m.particleSize + Math.random() * 2,
        color: m.solidColor,
        settled: false
      });
    }
  }

  function mix() {
    state.phase = 'mixing'; state.mixTime = 0; state.separating = false; state.sepTime = 0;
    state.mixIdx = parseInt(document.getElementById('mixture').value);
    createParticles();
    const m = MIXTURES[state.mixIdx];
    document.getElementById('dType').textContent = m.type;
    document.getElementById('dDissolve').textContent = m.dissolves ? 'Yes' : 'No';
    document.getElementById('dMethod').textContent = m.method;
    document.getElementById('dPhase').textContent = 'Mixing...';
  }

  function startSeparate() {
    if (state.phase !== 'mixed') return;
    state.separating = true; state.sepTime = 0;
    document.getElementById('dPhase').textContent = 'Separating...';
  }

  function setMethod(method) {
    state.sepMethod = method;
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(method === 'filter' ? 'mFilter' : method === 'evaporate' ? 'mEvap' : 'mSettle').classList.add('active');
    document.getElementById('dMethod').textContent = method.charAt(0).toUpperCase() + method.slice(1);
  }

  function reset() {
    state = { phase: 'ready', mixIdx: parseInt(document.getElementById('mixture').value), separating: false, sepMethod: '', mixTime: 0, sepTime: 0 };
    particles = [];
    document.getElementById('dType').textContent = '—';
    document.getElementById('dDissolve').textContent = '—';
    document.getElementById('dMethod').textContent = '—';
    document.getElementById('dPhase').textContent = 'Ready';
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
  }

  document.getElementById('btnMix').addEventListener('click', mix);
  document.getElementById('btnSeparate').addEventListener('click', startSeparate);
  document.getElementById('btnReset').addEventListener('click', reset);
  document.getElementById('mFilter').addEventListener('click', () => setMethod('filter'));
  document.getElementById('mEvap').addEventListener('click', () => setMethod('evaporate'));
  document.getElementById('mSettle').addEventListener('click', () => setMethod('settle'));

  function drawBeaker(cx, cy) {
    const bW = 180, bH = 220;
    const bx = cx - bW / 2, by = cy - bH / 2;
    ctx.strokeStyle = 'rgba(16,185,129,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(bx - 20, by); ctx.lineTo(bx, by);
    ctx.lineTo(bx, by + bH); ctx.lineTo(bx + bW, by + bH);
    ctx.lineTo(bx + bW, by); ctx.lineTo(bx + bW + 20, by);
    ctx.stroke();
    // Liquid fill
    const m = MIXTURES[state.mixIdx];
    if (state.phase !== 'ready') {
      const fillH = bH * 0.7;
      ctx.fillStyle = m.liquidColor;
      ctx.fillRect(bx + 2, by + bH - fillH, bW - 4, fillH - 2);
      // Water label
      ctx.fillStyle = 'rgba(59,130,246,0.6)';
      ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Water', cx, by + bH - 10);
    }
    return { bx, by, bW, bH };
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2 + 20;
    const m = MIXTURES[state.mixIdx];

    const { bx, by, bW, bH } = drawBeaker(cx, cy);
    const waterTop = by + bH * 0.3;
    const waterBot = by + bH - 4;

    if (state.phase === 'mixing') {
      state.mixTime++;
      particles.forEach(p => {
        p.x += (Math.random() - 0.5) * 6;
        p.y += (Math.random() - 0.5) * 4;
        p.x = Math.max(bx + 6, Math.min(bx + bW - 6, p.x));
        p.y = Math.max(waterTop, Math.min(waterBot, p.y));
      });
      if (state.mixTime > 90) {
        state.phase = 'mixed';
        document.getElementById('dPhase').textContent = 'Mixed';
        if (m.dissolves) {
          particles.forEach(p => p.size = Math.max(1, p.size * 0.5));
        }
      }
    }

    if (state.phase === 'mixed' && !state.separating) {
      if (m.dissolves) {
        particles.forEach(p => {
          p.x += (Math.random() - 0.5) * 1.5;
          p.y += (Math.random() - 0.5) * 1.5;
          p.x = Math.max(bx + 6, Math.min(bx + bW - 6, p.x));
          p.y = Math.max(waterTop, Math.min(waterBot, p.y));
        });
      } else {
        particles.forEach(p => {
          p.x += (Math.random() - 0.5) * 0.8;
          p.y += (Math.random() - 0.5) * 0.8;
          p.x = Math.max(bx + 6, Math.min(bx + bW - 6, p.x));
          p.y = Math.max(waterTop, Math.min(waterBot, p.y));
        });
      }
    }

    if (state.separating) {
      state.sepTime++;
      const progress = Math.min(1, state.sepTime / 150);
      if (state.sepMethod === 'settle' || state.sepMethod === 'filter') {
        if (!m.dissolves) {
          const targetY = state.mixIdx === 2 ? waterTop + 10 : waterBot - 10;
          particles.forEach(p => {
            p.y += (targetY - p.y) * 0.02;
            p.x += (Math.random() - 0.5) * (1 - progress) * 2;
          });
        }
      }
      if (state.sepMethod === 'evaporate') {
        particles.forEach(p => {
          if (m.dissolves) { p.y += 0.3; p.y = Math.min(waterBot, p.y); p.size = Math.min(m.particleSize + 1, p.size + 0.01); }
          else { p.y = Math.min(waterBot, p.y + 0.2); }
        });
        // Shrink water level visual
        const shrink = progress * bH * 0.5;
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(bx + 2, waterTop, bW - 4, shrink);
      }
      if (progress >= 1) {
        state.phase = 'separated';
        document.getElementById('dPhase').textContent = 'Separated!';
      }
    }

    // Draw particles
    const visibleCount = particles.filter(p => p.size > 0.5).length;
    particles.forEach(p => {
      if (p.size < 0.5) return;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      if (p.size > 3) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    });

    document.getElementById('dCount').textContent = visibleCount;

    // Draw labels
    ctx.fillStyle = '#10b981';
    ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    if (state.phase !== 'ready') {
      ctx.fillText(m.name, cx, by - 15);
    }

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
