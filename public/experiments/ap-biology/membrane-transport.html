<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cell Membrane & Transport — NeonPhysics AP Biology</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;color:#e8e6df;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
    #canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px}
    .panel{background:rgba(10,14,26,0.85);border:1px solid rgba(251,146,60,0.3);border-radius:8px;padding:14px;pointer-events:all;backdrop-filter:blur(8px)}
    .top-bar{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .title-block h1{font-size:1.1rem;color:#fdba74;font-weight:700;margin-bottom:2px}
    .title-block p{font-size:0.72rem;color:#94a3b8;max-width:280px}
    .controls{display:flex;flex-direction:column;gap:8px;min-width:220px}
    .slider-row{display:flex;flex-direction:column;gap:3px}
    .slider-row label{font-size:0.7rem;color:#94a3b8;display:flex;justify-content:space-between}
    .slider-row input[type=range]{width:100%;accent-color:#f97316;height:4px}
    .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    button{background:rgba(251,146,60,0.15);border:1px solid rgba(251,146,60,0.4);color:#fdba74;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:0.72rem;transition:all 0.2s}
    button:hover{background:rgba(251,146,60,0.3)}
    button.active{background:rgba(251,146,60,0.4);border-color:#f97316}
    .bottom-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
    .data-panel{min-width:180px}
    .data-row{display:flex;justify-content:space-between;font-size:0.7rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .data-val{color:#fb923c;font-weight:600;font-family:monospace}
    .formula-panel{flex:1;max-width:400px}
    .katex-wrap{margin:3px 0;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;font-size:0.72rem}
    .legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:0.65rem;color:#94a3b8}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .badge{display:inline-block;font-size:0.6rem;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(251,146,60,0.3);color:#fdba74}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Cell Membrane Transport <span class="badge">AP Bio</span></h1>
      <p>Fluid mosaic model: diffusion, osmosis, active transport</p>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Solute (high conc)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>Water</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Na⁺ (out)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>K⁺ (in)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div>Channel protein</div>
      </div>
    </div>
    <div class="panel controls">
      <div class="slider-row">
        <label>Intracellular [Solute] <span id="cin-val">100</span> mM</label>
        <input type="range" id="cin-slider" min="10" max="200" step="5" value="100">
      </div>
      <div class="slider-row">
        <label>Extracellular [Solute] <span id="cout-val">50</span> mM</label>
        <input type="range" id="cout-slider" min="10" max="200" step="5" value="50">
      </div>
      <div class="btn-row">
        <button id="btn-diffusion" class="active">Diffusion</button>
        <button id="btn-osmosis">Osmosis</button>
        <button id="btn-active">Active Transport</button>
      </div>
      <div class="btn-row">
        <button id="btn-play" class="active">⏸ Pause</button>
        <button id="btn-reset">↺ Reset</button>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <div style="font-size:0.72rem;color:#fdba74;margin-bottom:6px;font-weight:600">Transport Data</div>
      <div class="data-row">Mode <span class="data-val" id="d-mode">Diffusion</span></div>
      <div class="data-row">[In] <span class="data-val" id="d-cin">100</span> mM</div>
      <div class="data-row">[Out] <span class="data-val" id="d-cout">50</span> mM</div>
      <div class="data-row">Net Flux <span class="data-val" id="d-flux">→ Out</span></div>
      <div class="data-row">Osmotic P <span class="data-val" id="d-osm">0</span> kPa</div>
      <div class="data-row">ATP used <span class="data-val" id="d-atp">0</span></div>
    </div>
    <div class="panel formula-panel">
      <div style="font-size:0.72rem;color:#fdba74;margin-bottom:6px;font-weight:600">Transport Equations</div>
      <div class="katex-wrap" id="f1"></div>
      <div class="katex-wrap" id="f2"></div>
      <div class="katex-wrap" id="f3"></div>
    </div>
  </div>
</div>

<script>
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();scene.background=new THREE.Color(0x080c14);
const camera=new THREE.PerspectiveCamera(50,W/H,0.1,200);camera.position.set(0,0,20);
let controls;if(THREE.OrbitControls){controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;}
scene.add(new THREE.AmbientLight(0x334466,0.7));
const dl=new THREE.DirectionalLight(0xffaa66,1.2);dl.position.set(5,10,8);scene.add(dl);

// Membrane — phospholipid bilayer (two planes)
function makeMembrane(){
  const g=new THREE.Group();
  // Outer leaflet heads (orange)
  const headGeo=new THREE.SphereGeometry(0.15,8,6);
  const headMat=new THREE.MeshStandardMaterial({color:0xf97316,roughness:0.4,emissive:0xf97316,emissiveIntensity:0.2});
  // Tail (gray-blue)
  const tailGeo=new THREE.CylinderGeometry(0.05,0.05,0.5,5);
  const tailMat=new THREE.MeshStandardMaterial({color:0x1e3a5f,roughness:0.7});

  for(let x=-8;x<=8;x+=0.9){
    for(let z=-8;z<=8;z+=0.9){
      // Outer head
      const oh=new THREE.Mesh(headGeo,headMat);oh.position.set(x,0.4,z);g.add(oh);
      // Outer tail
      const ot=new THREE.Mesh(tailGeo,tailMat);ot.position.set(x,0.15,z);g.add(ot);
      // Inner head
      const ih=new THREE.Mesh(headGeo,headMat.clone());ih.position.set(x,-0.4,z);g.add(ih);
      // Inner tail
      const it=new THREE.Mesh(tailGeo,tailMat.clone());it.position.set(x,-0.15,z);g.add(it);
    }
  }
  return g;
}
const membraneGroup=makeMembrane();scene.add(membraneGroup);

// Channel proteins
const channelGroup=new THREE.Group();scene.add(channelGroup);
const NUM_CHANNELS=8;
for(let i=0;i<NUM_CHANNELS;i++){
  const x=(i-NUM_CHANNELS/2)*2+0.5;const z=(Math.random()-0.5)*3;
  const cGeo=new THREE.CylinderGeometry(0.2,0.2,1,8);
  const cMat=new THREE.MeshStandardMaterial({color:0xa855f7,roughness:0.3,emissive:0xa855f7,emissiveIntensity:0.3,transparent:true,opacity:0.8});
  const ch=new THREE.Mesh(cGeo,cMat);ch.position.set(x,0,z);channelGroup.add(ch);
}

// Particles
const MAX_P=120;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(MAX_P*3);const pCol=new Float32Array(MAX_P*3);
for(let i=0;i<MAX_P;i++){pPos[i*3]=100;}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
const pMat=new THREE.PointsMaterial({size:0.3,vertexColors:true,transparent:true,opacity:0.9});
const points=new THREE.Points(pGeo,pMat);scene.add(points);

let particles=Array.from({length:MAX_P},(_,i)=>{
  const inside=Math.random()<0.5;
  return{x:(Math.random()-0.5)*14,y:(inside?1:-1)*(0.8+Math.random()*4),z:(Math.random()-0.5)*14,vx:(Math.random()-0.5)*1,vy:(Math.random()-0.5)*0.2,vz:(Math.random()-0.5)*1,type:'solute',inside,index:i,crossing:false,crossTimer:0};
});

let state={cin:100,cout:50,mode:'diffusion',playing:true,time:0,atpUsed:0};

function getParticleColor(p){
  if(p.type==='water')return[0.37,0.64,1];
  if(p.type==='na')return[0.95,0.44,0.44];
  if(p.type==='k')return[0.2,0.83,0.6];
  return[1,0.75,0.15];// solute
}

function initParticles(){
  const n=particles.length;
  const nIn=Math.round(state.cin/(state.cin+state.cout)*n);
  particles.forEach((p,i)=>{
    p.inside=i<nIn;
    p.x=(Math.random()-0.5)*14;
    p.y=(p.inside?1:-1)*(0.8+Math.random()*4);
    p.z=(Math.random()-0.5)*14;
    p.crossing=false;
    if(state.mode==='osmosis')p.type='water';
    else if(state.mode==='active')p.type=i%2===0?'na':'k';
    else p.type='solute';
  });
}

function updateParticles(dt){
  const pos=pGeo.attributes.position.array;const col=pGeo.attributes.color.array;
  const crossRate=(state.mode==='diffusion')?Math.abs(state.cin-state.cout)/200:
                  (state.mode==='osmosis')?Math.abs(state.cin-state.cout)/150:0.1;

  particles.forEach(p=>{
    p.x+=p.vx*dt*1.5;p.z+=p.vz*dt*1.5;p.y+=p.vy*dt*0.5;
    if(Math.abs(p.x)>7)p.vx*=-1;if(Math.abs(p.z)>7)p.vz*=-1;
    const wallY=0.55;
    if(p.inside&&p.y<wallY){p.y=wallY;p.vy=Math.abs(p.vy);}
    if(!p.inside&&p.y>-wallY){p.y=-wallY;p.vy=-Math.abs(p.vy);}
    if(p.inside&&p.y>7){p.y=7;p.vy=-Math.abs(p.vy);}
    if(!p.inside&&p.y<-7){p.y=-7;p.vy=Math.abs(p.vy);}

    // Crossing
    if(!p.crossing&&Math.random()<crossRate*dt){
      // Direction depends on mode and concentration
      const shouldCross=(state.mode==='diffusion'&&p.inside&&state.cin>state.cout)||
                        (state.mode==='diffusion'&&!p.inside&&state.cout>state.cin)||
                        (state.mode==='osmosis'&&!p.inside&&state.cin>state.cout)||
                        (state.mode==='active');
      if(shouldCross){p.crossing=true;p.crossTimer=0.5;if(state.mode==='active')state.atpUsed++;}
    }
    if(p.crossing){
      p.crossTimer-=dt;p.y+=p.inside?-3*dt:3*dt;
      if(p.crossTimer<=0){p.inside=!p.inside;p.crossing=false;p.vy=(p.inside?1:-1)*0.5;}
    }

    pos[p.index*3]=p.x;pos[p.index*3+1]=p.y;pos[p.index*3+2]=p.z;
    const c=getParticleColor(p);const fade=p.crossing?1.5:1;
    col[p.index*3]=c[0]*fade;col[p.index*3+1]=c[1]*fade;col[p.index*3+2]=c[2]*fade;
  });
  pGeo.attributes.position.needsUpdate=true;pGeo.attributes.color.needsUpdate=true;
}

function countInOut(){
  let nIn=0,nOut=0;particles.forEach(p=>{if(p.inside)nIn++;else nOut++;});
  return{nIn,nOut};
}

function updateUI(){
  const{nIn,nOut}=countInOut();
  const total=particles.length;
  const cinEff=nIn/total*200;const coutEff=nOut/total*200;
  document.getElementById('d-mode').textContent=state.mode.charAt(0).toUpperCase()+state.mode.slice(1);
  document.getElementById('d-cin').textContent=Math.round(cinEff);
  document.getElementById('d-cout').textContent=Math.round(coutEff);
  const net=cinEff>coutEff?'→ Out':'← In';
  document.getElementById('d-flux').textContent=net;
  document.getElementById('d-osm').textContent=Math.round(Math.abs(cinEff-coutEff)*0.8);
  document.getElementById('d-atp').textContent=state.atpUsed;
}

// Mode buttons
function setMode(m){
  state.mode=m;
  ['diffusion','osmosis','active'].forEach(id=>document.getElementById('btn-'+id).classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  initParticles();updateUI();
}
document.getElementById('btn-diffusion').addEventListener('click',()=>setMode('diffusion'));
document.getElementById('btn-osmosis').addEventListener('click',()=>setMode('osmosis'));
document.getElementById('btn-active').addEventListener('click',()=>setMode('active'));

document.getElementById('cin-slider').addEventListener('input',e=>{state.cin=parseInt(e.target.value);document.getElementById('cin-val').textContent=state.cin;initParticles();});
document.getElementById('cout-slider').addEventListener('input',e=>{state.cout=parseInt(e.target.value);document.getElementById('cout-val').textContent=state.cout;initParticles();});
document.getElementById('btn-play').addEventListener('click',()=>{state.playing=!state.playing;document.getElementById('btn-play').textContent=state.playing?'⏸ Pause':'▶ Play';document.getElementById('btn-play').classList.toggle('active',state.playing);});
document.getElementById('btn-reset').addEventListener('click',()=>{state.atpUsed=0;initParticles();});

katex.render('J=-D\\frac{dC}{dx}\\;\\text{(Fick\'s Law: flux ∝ gradient)}',document.getElementById('f1'),{throwOnError:false});
katex.render('\\Pi=iMRT\\;\\text{(osmotic pressure)}',document.getElementById('f2'),{throwOnError:false});
katex.render('\\text{Na}^+/\\text{K}^+ \\text{ pump: 3 Na}^+ \\text{ out, 2 K}^+ \\text{ in per ATP}',document.getElementById('f3'),{throwOnError:false});

initParticles();

const grid=new THREE.GridHelper(20,10,0x111122,0x111122);grid.position.y=-8;scene.add(grid);

let clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();state.time+=dt;
  if(state.playing){
    updateParticles(dt);
    if(Math.floor(state.time*4)%4===0)updateUI();
    channelGroup.children.forEach((ch,i)=>ch.rotation.y+=dt*(0.5+i*0.1));
    membraneGroup.rotation.y+=0.001;
  }
  if(controls)controls.update();
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
