<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitosis: Cell Division & the Cell Cycle — NeonPhysics AP Biology</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;color:#e8e6df;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
    #canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px}
    .panel{background:rgba(10,14,26,0.85);border:1px solid rgba(59,130,246,0.3);border-radius:8px;padding:14px;pointer-events:all;backdrop-filter:blur(8px)}
    .top-bar{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .title-block h1{font-size:1.1rem;color:#93c5fd;font-weight:700;margin-bottom:2px}
    .title-block p{font-size:0.72rem;color:#94a3b8;max-width:280px}
    .controls{display:flex;flex-direction:column;gap:8px;min-width:220px}
    .slider-row{display:flex;flex-direction:column;gap:3px}
    .slider-row label{font-size:0.7rem;color:#94a3b8;display:flex;justify-content:space-between}
    .slider-row input[type=range]{width:100%;accent-color:#3b82f6;height:4px}
    .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    button{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.4);color:#93c5fd;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:0.72rem;transition:all 0.2s}
    button:hover{background:rgba(59,130,246,0.3)}
    button.active{background:rgba(59,130,246,0.4);border-color:#3b82f6}
    button.phase-btn{background:rgba(30,64,175,0.2)}
    .bottom-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
    .data-panel{min-width:200px}
    .data-row{display:flex;justify-content:space-between;font-size:0.7rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .data-val{color:#34d399;font-weight:600;font-family:monospace}
    .phase-display{min-width:200px}
    .phase-name{font-size:1.2rem;font-weight:700;color:#93c5fd;text-align:center;margin-bottom:4px}
    .phase-desc{font-size:0.68rem;color:#94a3b8;text-align:center;line-height:1.3}
    .formula-panel{flex:1;max-width:380px}
    .katex-wrap{margin:3px 0;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;font-size:0.72rem}
    .phase-progress{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:8px}
    .phase-bar{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;transition:width 0.3s}
    .badge{display:inline-block;font-size:0.6rem;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(59,130,246,0.3);color:#93c5fd}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Mitosis <span class="badge">AP Bio</span></h1>
      <p>Cell cycle phases with chromosome tracking</p>
    </div>
    <div class="panel controls">
      <div class="slider-row">
        <label>Division Speed <span id="spd-val">1</span>×</label>
        <input type="range" id="spd-slider" min="0.5" max="5" step="0.5" value="1">
      </div>
      <div class="slider-row">
        <label>Chromosome Pairs (n) <span id="chr-val">4</span></label>
        <input type="range" id="chr-slider" min="2" max="8" step="1" value="4">
      </div>
      <div class="btn-row">
        <button id="btn-play" class="active">⏸ Pause</button>
        <button id="btn-reset">↺ Reset</button>
      </div>
      <div class="btn-row">
        <button class="phase-btn" onclick="jumpToPhase('interphase')">Interphase</button>
        <button class="phase-btn" onclick="jumpToPhase('prophase')">Prophase</button>
        <button class="phase-btn" onclick="jumpToPhase('metaphase')">Metaphase</button>
        <button class="phase-btn" onclick="jumpToPhase('anaphase')">Anaphase</button>
        <button class="phase-btn" onclick="jumpToPhase('telophase')">Telophase</button>
      </div>
    </div>
    <div class="panel phase-display">
      <div class="phase-name" id="phase-name">Interphase</div>
      <div class="phase-desc" id="phase-desc">Cell grows, DNA replicates in S phase</div>
      <div class="phase-progress"><div class="phase-bar" id="phase-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <div style="font-size:0.72rem;color:#93c5fd;margin-bottom:6px;font-weight:600">Cell Cycle Data</div>
      <div class="data-row">Phase <span class="data-val" id="d-phase">Interphase</span></div>
      <div class="data-row">Chromosomes (2n) <span class="data-val" id="d-chrs">8</span></div>
      <div class="data-row">Chromatids <span class="data-val" id="d-chrd">16</span></div>
      <div class="data-row">Division # <span class="data-val" id="d-div">0</span></div>
      <div class="data-row">Daughter Cells <span class="data-val" id="d-daughters">0</span></div>
    </div>
    <div class="panel formula-panel">
      <div style="font-size:0.72rem;color:#93c5fd;margin-bottom:6px;font-weight:600">Cell Cycle Equations</div>
      <div class="katex-wrap" id="f1"></div>
      <div class="katex-wrap" id="f2"></div>
      <div class="katex-wrap" id="f3"></div>
    </div>
  </div>
</div>

<script>
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0e1a);
const camera=new THREE.PerspectiveCamera(55,W/H,0.1,200);
camera.position.set(0,0,22);
let controls;
if(THREE.OrbitControls){controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;}

scene.add(new THREE.AmbientLight(0x334466,0.8));
const dl=new THREE.DirectionalLight(0x6699ff,1.2);dl.position.set(10,15,10);scene.add(dl);
scene.add(new THREE.PointLight(0x3b82f6,2,40));

// State
const PHASES=['interphase','prophase','metaphase','anaphase','telophase','cytokinesis'];
const PHASE_DURATION=3.0;
let state={
  phase:0,
  phaseProgress:0,
  playing:true,
  speed:1,
  numPairs:4,
  divisionCount:0,
  time:0
};

const PHASE_INFO={
  interphase:{name:'Interphase (G1-S-G2)',desc:'Cell grows, DNA replicates, organelles duplicate'},
  prophase:{name:'Prophase',desc:'Chromosomes condense, spindle forms, nuclear envelope breaks down'},
  metaphase:{name:'Metaphase',desc:'Chromosomes align at the metaphase plate (equatorial plane)'},
  anaphase:{name:'Anaphase',desc:'Sister chromatids separate; pulled to opposite poles'},
  telophase:{name:'Telophase',desc:'Nuclear envelopes reform, chromosomes decondense'},
  cytokinesis:{name:'Cytokinesis',desc:'Cytoplasm divides — two daughter cells formed!'}
};

// Cell body
const cellGroup=new THREE.Group();scene.add(cellGroup);
const cellMat=new THREE.MeshStandardMaterial({color:0x1e3a5f,transparent:true,opacity:0.3,wireframe:false,side:THREE.DoubleSide});
const cellMesh=new THREE.Mesh(new THREE.SphereGeometry(5,32,32),cellMat);
cellGroup.add(cellMesh);

// Nucleus
const nucMat=new THREE.MeshStandardMaterial({color:0x2a4a7f,transparent:true,opacity:0.5});
const nucleus=new THREE.Mesh(new THREE.SphereGeometry(2.5,24,24),nucMat);
cellGroup.add(nucleus);

// Chromosomes
const chrGroup=new THREE.Group();cellGroup.add(chrGroup);
const CHR_COLORS=[0xef4444,0x3b82f6,0x22c55e,0xf59e0b,0xa855f7,0xec4899,0x06b6d4,0x84cc16];
let chromosomes=[];

function buildChromosomes(){
  while(chrGroup.children.length)chrGroup.remove(chrGroup.children[0]);
  chromosomes=[];
  for(let i=0;i<state.numPairs;i++){
    const color=CHR_COLORS[i%CHR_COLORS.length];
    const mat=new THREE.MeshStandardMaterial({color,roughness:0.3,metalness:0.3,emissive:color,emissiveIntensity:0.2});
    const geo=new THREE.CylinderGeometry(0.15,0.15,0.6,8);
    // Pair: homolog A
    const chrA=new THREE.Mesh(geo,mat);
    const chrB=new THREE.Mesh(geo,mat.clone());
    chrGroup.add(chrA,chrB);
    chromosomes.push({meshA:chrA,meshB:chrB,color,pairIndex:i});
  }
}

// Spindle fibers
const spindleGroup=new THREE.Group();cellGroup.add(spindleGroup);

function updateSpindle(show,elongation=1){
  while(spindleGroup.children.length)spindleGroup.remove(spindleGroup.children[0]);
  if(!show)return;
  for(let i=0;i<8;i++){
    const angle=(i/8)*Math.PI*2;
    const r=0.5;
    const geo=new THREE.CylinderGeometry(0.02,0.02,elongation*4,4);
    const mat=new THREE.MeshStandardMaterial({color:0x7dd3fc,transparent:true,opacity:0.5});
    const fiber=new THREE.Mesh(geo,mat);
    fiber.position.set(Math.cos(angle)*r,0,Math.sin(angle)*r);
    fiber.rotation.z=Math.PI/2;
    spindleGroup.add(fiber);
  }
}

// Cleavage furrow
let furrow;
function showFurrow(progress){
  if(furrow){cellGroup.remove(furrow);}
  if(progress<=0)return;
  const geo=new THREE.TorusGeometry(5,0.1+progress*0.4,8,32);
  const mat=new THREE.MeshStandardMaterial({color:0x60a5fa,transparent:true,opacity:0.7});
  furrow=new THREE.Mesh(geo,mat);
  furrow.rotation.x=Math.PI/2;
  cellGroup.add(furrow);
}

function positionChromosomes(phase,t){
  chromosomes.forEach((ch,i)=>{
    const angle=(i/chromosomes.length)*Math.PI*2;
    const r=1.5;
    switch(phase){
      case 0:{// Interphase — inside nucleus, compact
        const nx=Math.cos(angle)*0.8,nz=Math.sin(angle)*0.8;
        ch.meshA.position.set(nx,0.2,nz);ch.meshB.position.set(nx+0.2,-0.2,nz+0.2);
        ch.meshA.scale.setScalar(1);ch.meshB.scale.setScalar(1);
        break;}
      case 1:{// Prophase — condense, spread
        const s=1+t*0.5;ch.meshA.scale.setScalar(s);ch.meshB.scale.setScalar(s);
        ch.meshA.position.set(Math.cos(angle)*r,0,Math.sin(angle)*r);
        ch.meshB.position.set(Math.cos(angle+0.3)*r,0,Math.sin(angle+0.3)*r);
        break;}
      case 2:{// Metaphase — align on equatorial plate
        const plateAngle=(i/chromosomes.length)*Math.PI*2;
        const rx=Math.cos(plateAngle)*2.5;const rz=Math.sin(plateAngle)*2.5;
        ch.meshA.position.lerp(new THREE.Vector3(rx,0.3,rz),0.1);
        ch.meshB.position.lerp(new THREE.Vector3(rx,-0.3,rz),0.1);
        ch.meshA.scale.setScalar(1.5);ch.meshB.scale.setScalar(1.5);
        break;}
      case 3:{// Anaphase — separate to poles
        const yA=t*3.5,yB=-t*3.5;
        ch.meshA.position.lerp(new THREE.Vector3(Math.cos(angle)*1.5,yA,Math.sin(angle)*1.5),0.08);
        ch.meshB.position.lerp(new THREE.Vector3(Math.cos(angle)*1.5,yB,Math.sin(angle)*1.5),0.08);
        ch.meshA.scale.setScalar(1.5);ch.meshB.scale.setScalar(1.5);
        break;}
      case 4:case 5:{// Telophase/Cytokinesis — decondense at poles
        const yA=3.5-t*1,yB=-3.5+t*1;
        ch.meshA.position.set(Math.cos(angle)*0.8,yA,Math.sin(angle)*0.8);
        ch.meshB.position.set(Math.cos(angle)*0.8,yB,Math.sin(angle)*0.8);
        ch.meshA.scale.setScalar(1-t*0.3);ch.meshB.scale.setScalar(1-t*0.3);
        break;}
    }
  });
}

function updateVisuals(phase,t){
  // Nuclear envelope
  const showNuc=phase===0||phase>=4;
  nucleus.visible=showNuc;
  nucleus.material.opacity=phase===0?0.5:Math.max(0,1-t)*0.5;

  // Cell shape
  if(phase===5){
    cellMesh.scale.y=1-t*0.3;
    cellMesh.scale.x=1+t*0.15;
  }else{cellMesh.scale.setScalar(1);}

  // Spindle
  updateSpindle(phase>=1&&phase<=3,phase===3?0.5+t*0.5:1);

  // Furrow
  showFurrow(phase===5?t:0);

  // Phase UI
  const pname=Object.keys(PHASE_INFO)[Math.min(phase,5)];
  const info=PHASE_INFO[pname]||PHASE_INFO.interphase;
  document.getElementById('phase-name').textContent=info.name;
  document.getElementById('phase-desc').textContent=info.desc;
  document.getElementById('phase-bar').style.width=(t*100)+'%';
  document.getElementById('d-phase').textContent=info.name.split(' ')[0];
  document.getElementById('d-chrs').textContent=state.numPairs*2;
  document.getElementById('d-chrd').textContent=state.numPairs*(phase<2?4:2);
  document.getElementById('d-div').textContent=state.divisionCount;
  document.getElementById('d-daughters').textContent=state.divisionCount*2;
}

function jumpToPhase(phaseName){
  const idx=PHASES.indexOf(phaseName);if(idx>=0){state.phase=idx;state.phaseProgress=0;}
}

buildChromosomes();
updateSpindle(false);

// Controls
document.getElementById('spd-slider').addEventListener('input',e=>{state.speed=parseFloat(e.target.value);document.getElementById('spd-val').textContent=state.speed;});
document.getElementById('chr-slider').addEventListener('input',e=>{state.numPairs=parseInt(e.target.value);document.getElementById('chr-val').textContent=state.numPairs;buildChromosomes();});
document.getElementById('btn-play').addEventListener('click',()=>{state.playing=!state.playing;document.getElementById('btn-play').textContent=state.playing?'⏸ Pause':'▶ Play';document.getElementById('btn-play').classList.toggle('active',state.playing);});
document.getElementById('btn-reset').addEventListener('click',()=>{state.phase=0;state.phaseProgress=0;state.playing=true;document.getElementById('btn-play').textContent='⏸ Pause';document.getElementById('btn-play').classList.add('active');buildChromosomes();updateSpindle(false);showFurrow(0);});

katex.render('2n \\xrightarrow{\\text{Mitosis}} 2 \\times 2n \\text{ (identical daughters)}',document.getElementById('f1'),{throwOnError:false});
katex.render('\\text{G}_1 \\to S \\to \\text{G}_2 \\to \\text{Prophase} \\to \\text{Metaphase} \\to \\text{Anaphase} \\to \\text{Telophase}',document.getElementById('f2'),{throwOnError:false});
katex.render('\\text{2n sister chromatids} \\xrightarrow{\\text{Anaphase}} \\text{n chromosomes each pole}',document.getElementById('f3'),{throwOnError:false});

const grid=new THREE.GridHelper(40,20,0x1a2744,0x1a2744);grid.position.y=-8;scene.add(grid);

let clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  state.time+=dt;

  if(state.playing){
    state.phaseProgress+=dt*state.speed/PHASE_DURATION;
    if(state.phaseProgress>=1){
      state.phaseProgress=0;
      state.phase=(state.phase+1)%PHASES.length;
      if(state.phase===0)state.divisionCount++;
    }
  }

  positionChromosomes(state.phase,state.phaseProgress);
  updateVisuals(state.phase,state.phaseProgress);

  cellGroup.rotation.y+=0.003;
  if(controls)controls.update();
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
