<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural Selection & Population Genetics — NeonPhysics AP Biology</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;color:#e8e6df;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
    #canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px}
    .panel{background:rgba(10,14,26,0.85);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:14px;pointer-events:all;backdrop-filter:blur(8px)}
    .top-bar{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .title-block h1{font-size:1.1rem;color:#86efac;font-weight:700;margin-bottom:2px}
    .title-block p{font-size:0.72rem;color:#94a3b8;max-width:280px}
    .controls{display:flex;flex-direction:column;gap:8px;min-width:220px}
    .slider-row{display:flex;flex-direction:column;gap:3px}
    .slider-row label{font-size:0.7rem;color:#94a3b8;display:flex;justify-content:space-between}
    .slider-row input[type=range]{width:100%;accent-color:#22c55e;height:4px}
    .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    button{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#86efac;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:0.72rem;transition:all 0.2s}
    button:hover{background:rgba(34,197,94,0.3)}
    button.active{background:rgba(34,197,94,0.4);border-color:#22c55e}
    .bottom-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
    .data-panel{min-width:190px}
    .data-row{display:flex;justify-content:space-between;font-size:0.7rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .data-val{color:#34d399;font-weight:600;font-family:monospace}
    .formula-panel{flex:1;max-width:380px}
    .katex-wrap{margin:3px 0;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;font-size:0.72rem}
    #chart-canvas{width:100%;height:80px;border-radius:4px;background:rgba(0,0,0,0.3);margin-top:6px}
    .badge{display:inline-block;font-size:0.6rem;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(34,197,94,0.3);color:#86efac}
    .env-btn{background:rgba(139,92,246,0.15);border-color:rgba(139,92,246,0.4);color:#c4b5fd}
    .env-btn.active{background:rgba(139,92,246,0.4);border-color:#8b5cf6}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="panel title-block">
      <h1>Natural Selection <span class="badge">AP Bio</span></h1>
      <p>Population genetics — allele frequency change over generations</p>
    </div>
    <div class="panel controls">
      <div class="slider-row">
        <label>Population Size <span id="pop-val">100</span></label>
        <input type="range" id="pop-slider" min="20" max="300" step="10" value="100">
      </div>
      <div class="slider-row">
        <label>Selection Coefficient (s) <span id="s-val">0.20</span></label>
        <input type="range" id="s-slider" min="0" max="1" step="0.05" value="0.2">
      </div>
      <div class="slider-row">
        <label>Initial p (dominant freq) <span id="p-val">0.50</span></label>
        <input type="range" id="p-slider" min="0.1" max="0.9" step="0.05" value="0.5">
      </div>
      <div class="btn-row">
        <button id="btn-run" class="active">⏸ Pause</button>
        <button id="btn-reset">↺ Reset</button>
        <button id="btn-bottleneck">⚡ Bottleneck</button>
      </div>
      <div class="btn-row">
        <button class="env-btn active" id="env-green" onclick="setEnv('green')">🌿 Green Env</button>
        <button class="env-btn" id="env-brown" onclick="setEnv('brown')">🍂 Brown Env</button>
        <button class="env-btn" id="env-mixed" onclick="setEnv('mixed')">🌾 Mixed Env</button>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="panel data-panel">
      <div style="font-size:0.72rem;color:#86efac;margin-bottom:6px;font-weight:600">Population Genetics</div>
      <div class="data-row">Generation <span class="data-val" id="d-gen">0</span></div>
      <div class="data-row">Dominant freq (p) <span class="data-val" id="d-p">0.50</span></div>
      <div class="data-row">Recessive freq (q) <span class="data-val" id="d-q">0.50</span></div>
      <div class="data-row">AA (p²) <span class="data-val" id="d-AA">0.25</span></div>
      <div class="data-row">Aa (2pq) <span class="data-val" id="d-Aa">0.50</span></div>
      <div class="data-row">aa (q²) <span class="data-val" id="d-aa">0.25</span></div>
      <div class="data-row">Fitness (aa) <span class="data-val" id="d-fit">0.80</span></div>
      <div class="data-row">Population <span class="data-val" id="d-pop">100</span></div>
    </div>
    <div class="panel" style="flex:1;max-width:420px">
      <div style="font-size:0.72rem;color:#86efac;margin-bottom:4px;font-weight:600">Allele Frequency Over Generations</div>
      <canvas id="chart-canvas" width="400" height="80"></canvas>
      <div class="katex-wrap" id="f1" style="margin-top:6px"></div>
      <div class="katex-wrap" id="f2"></div>
    </div>
  </div>
</div>

<script>
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0e1a);
const camera=new THREE.PerspectiveCamera(55,W/H,0.1,200);camera.position.set(0,15,20);camera.lookAt(0,0,0);
let controls;if(THREE.OrbitControls){controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.target.set(0,0,0);}
scene.add(new THREE.AmbientLight(0x334466,0.8));
const dl=new THREE.DirectionalLight(0x66dd88,1.2);dl.position.set(5,15,8);scene.add(dl);

// Ground plane — environment
let envMesh;
function buildGround(env){
  if(envMesh)scene.remove(envMesh);
  const colors={green:0x1a4a1a,brown:0x3a2010,mixed:0x2a3a1a};
  const geo=new THREE.PlaneGeometry(30,30,1,1);
  const mat=new THREE.MeshStandardMaterial({color:colors[env]||0x1a4a1a,roughness:1});
  envMesh=new THREE.Mesh(geo,mat);envMesh.rotation.x=-Math.PI/2;scene.add(envMesh);
}
let env='green';
buildGround(env);

function setEnv(e){
  env=e;buildGround(e);
  ['env-green','env-brown','env-mixed'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('env-'+e).classList.add('active');
}

// Population
let state={populationSize:100,s:0.2,p:0.5,generation:0,running:true,genTimer:0};
let individuals=[];

// Beetle colors: AA/Aa = green (camouflaged), aa = red/orange (visible)
// On green background: aa are less fit; on brown: AA/Aa less fit
function genotypeColor(geno,env){
  const colors={
    green:{AA:0x22c55e,Aa:0x4ade80,aa:0xef4444},
    brown:{AA:0x78350f,Aa:0xa16207,aa:0xef4444},
    mixed:{AA:0x22c55e,Aa:0xd97706,aa:0xef4444}
  };
  return (colors[env]||colors.green)[geno];
}

const beetleGeo=new THREE.SphereGeometry(0.2,8,6);
const instMeshes={AA:null,Aa:null,aa:null};

function buildPopulation(){
  // Remove old
  scene.children.filter(c=>c.userData.isBeetle).forEach(c=>scene.remove(c));
  individuals=[];

  const q=1-state.p;
  const n=state.populationSize;
  const nAA=Math.round(state.p*state.p*n);
  const nAa=Math.round(2*state.p*q*n);
  const naa=n-nAA-nAa;

  function addGroup(geno,count){
    for(let i=0;i<count;i++){
      const mat=new THREE.MeshStandardMaterial({color:genotypeColor(geno,env),roughness:0.4,metalness:0.2,emissive:genotypeColor(geno,env),emissiveIntensity:0.1});
      const mesh=new THREE.Mesh(beetleGeo,mat);
      const x=(Math.random()-0.5)*24,z=(Math.random()-0.5)*24;
      mesh.position.set(x,0.2,z);
      mesh.userData={isBeetle:true,geno,vx:(Math.random()-0.5)*0.5,vz:(Math.random()-0.5)*0.5};
      scene.add(mesh);
      individuals.push(mesh);
    }
  }
  addGroup('AA',Math.max(0,nAA));
  addGroup('Aa',Math.max(0,nAa));
  addGroup('aa',Math.max(0,naa));
}

// History for chart
const pHistory=[];
const qHistory=[];

function runGeneration(){
  state.generation++;
  // Selection: remove aa with probability s (env-dependent)
  const effectiveS=env==='brown'?-state.s:(env==='mixed'?state.s*0.5:state.s);

  // Hardy-Weinberg update with selection
  const q=1-state.p;
  let newP;
  if(effectiveS>0){
    // Selection against aa
    const denom=1-effectiveS*q*q;
    newP=(state.p*state.p+state.p*q)/denom;
  }else if(effectiveS<0){
    // Selection against AA
    const s2=-effectiveS;
    const denom=1-s2*state.p*state.p;
    newP=(state.p*state.p*(1-s2)+state.p*q)/denom;
  }else{newP=state.p;}
  state.p=Math.max(0.01,Math.min(0.99,newP));

  pHistory.push(state.p);
  if(pHistory.length>80)pHistory.shift();
  qHistory.push(1-state.p);
  if(qHistory.length>80)qHistory.shift();

  buildPopulation();
  updateChart();
  updateDataUI();
}

function updateChart(){
  const canvas=document.getElementById('chart-canvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,canvas.width,canvas.height);
  function drawLine(data,color){
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
    data.forEach((v,i)=>{
      const x=i/Math.max(data.length-1,1)*canvas.width;
      const y=(1-v)*canvas.height;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });ctx.stroke();
  }
  drawLine(pHistory,'#22c55e');
  drawLine(qHistory,'#ef4444');
  ctx.fillStyle='#22c55e';ctx.font='10px monospace';ctx.fillText('p',4,12);
  ctx.fillStyle='#ef4444';ctx.fillText('q',4,24);
}

function updateDataUI(){
  const q=1-state.p;
  document.getElementById('d-gen').textContent=state.generation;
  document.getElementById('d-p').textContent=state.p.toFixed(3);
  document.getElementById('d-q').textContent=q.toFixed(3);
  document.getElementById('d-AA').textContent=(state.p*state.p).toFixed(3);
  document.getElementById('d-Aa').textContent=(2*state.p*q).toFixed(3);
  document.getElementById('d-aa').textContent=(q*q).toFixed(3);
  document.getElementById('d-fit').textContent=(1-state.s).toFixed(2);
  document.getElementById('d-pop').textContent=state.populationSize;
}

// Controls
document.getElementById('pop-slider').addEventListener('input',e=>{state.populationSize=parseInt(e.target.value);document.getElementById('pop-val').textContent=state.populationSize;buildPopulation();});
document.getElementById('s-slider').addEventListener('input',e=>{state.s=parseFloat(e.target.value);document.getElementById('s-val').textContent=state.s.toFixed(2);});
document.getElementById('p-slider').addEventListener('input',e=>{state.p=parseFloat(e.target.value);document.getElementById('p-val').textContent=state.p.toFixed(2);buildPopulation();updateDataUI();});
document.getElementById('btn-run').addEventListener('click',()=>{state.running=!state.running;document.getElementById('btn-run').textContent=state.running?'⏸ Pause':'▶ Run';document.getElementById('btn-run').classList.toggle('active',state.running);});
document.getElementById('btn-reset').addEventListener('click',()=>{state.generation=0;state.p=parseFloat(document.getElementById('p-slider').value);pHistory.length=0;qHistory.length=0;buildPopulation();updateDataUI();updateChart();});
document.getElementById('btn-bottleneck').addEventListener('click',()=>{
  // Reduce population dramatically, causing genetic drift
  const saved=state.populationSize;state.populationSize=10;buildPopulation();
  setTimeout(()=>{state.populationSize=saved;buildPopulation();},500);
  const el=document.getElementById('btn-bottleneck');el.style.background='rgba(239,68,68,0.4)';
  setTimeout(()=>el.style.background='',1000);
});

katex.render('p^2 + 2pq + q^2 = 1 \\;\\;\\text{(Hardy-Weinberg equilibrium)}',document.getElementById('f1'),{throwOnError:false});
katex.render('\\Delta p = \\frac{spq^2}{1-sq^2} \\;\\text{(selection against recessive)}',document.getElementById('f2'),{throwOnError:false});

buildPopulation();updateDataUI();updateChart();

let genInterval=setInterval(()=>{if(state.running)runGeneration();},800);

let clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  // Move beetles
  individuals.forEach(b=>{
    if(!b.userData.vx)return;
    b.position.x+=b.userData.vx*dt*2;
    b.position.z+=b.userData.vz*dt*2;
    if(Math.abs(b.position.x)>12)b.userData.vx*=-1;
    if(Math.abs(b.position.z)>12)b.userData.vz*=-1;
    b.rotation.y+=dt;
  });
  if(controls)controls.update();
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
