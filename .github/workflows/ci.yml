name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  coverage:
    name: Coverage Ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage -- --reporter=json --outputFile=coverage-report.json || true

      - name: Check coverage ratchet
        run: |
          BASELINE_FILE=".github/workflows/coverage-baseline.json"
          COVERAGE_DIR="coverage"
          SUMMARY_FILE="$COVERAGE_DIR/coverage-summary.json"

          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "::warning::No coverage summary generated. Skipping ratchet check."
            echo "This can happen if tests fail or coverage is not configured."
            exit 0
          fi

          if [ ! -f "$BASELINE_FILE" ]; then
            echo "::warning::No baseline file found at $BASELINE_FILE. Skipping ratchet check."
            exit 0
          fi

          FAILED=0

          for METRIC in lines branches functions statements; do
            BASELINE=$(jq -r ".$METRIC" "$BASELINE_FILE")
            ACTUAL=$(jq -r ".total.$METRIC.pct" "$SUMMARY_FILE")

            if [ "$ACTUAL" = "null" ] || [ -z "$ACTUAL" ]; then
              echo "::warning::Could not read $METRIC from coverage summary."
              continue
            fi

            BELOW=$(echo "$ACTUAL < $BASELINE" | bc -l)
            if [ "$BELOW" = "1" ]; then
              echo "::error::Coverage regression: $METRIC is ${ACTUAL}% (baseline: ${BASELINE}%)"
              FAILED=1
            else
              echo "OK: $METRIC = ${ACTUAL}% (baseline: ${BASELINE}%)"
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "Coverage has dropped below the baseline."
            echo "If this is intentional, update $BASELINE_FILE with the new values."
            exit 1
          fi

          echo ""
          echo "All coverage metrics meet or exceed baseline."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    env:
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_NAME: "NeonPhysics"
      NEXT_PUBLIC_THEME: "default"
      NEXT_PUBLIC_APPEARANCE: "system"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DATABASE_PROVIDER: "postgresql"
      DB_SINGLETON_ENABLED: "true"
      AUTH_SECRET: "ci-placeholder-secret-do-not-use-in-production"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder-token"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript strict check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

  seo-audit:
    name: SEO Audit (homepage)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    env:
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_NAME: "Scivra"
      NEXT_PUBLIC_THEME: "default"
      NEXT_PUBLIC_APPEARANCE: "system"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DATABASE_PROVIDER: "postgresql"
      DB_SINGLETON_ENABLED: "true"
      AUTH_SECRET: "ci-placeholder-secret-do-not-use-in-production"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder-token"
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 pulls full history so the diff against the
          # PR base branch (origin/main) below resolves; default depth=1
          # only fetches the PR head and `git diff origin/main...HEAD`
          # fails with "unknown revision".
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Check homepage-related changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if echo "$CHANGED" | grep -qE '^(src/app/\[locale\]/\(landing\)|src/themes/default/blocks|src/config/locale/messages/.*landing.json|src/shared/lib/seo|src/app/layout.tsx)'; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.filter.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.filter.outputs.should_run == 'true'
        run: pnpm build

      - name: Start server in background
        if: steps.filter.outputs.should_run == 'true'
        run: |
          pnpm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server ready
        if: steps.filter.outputs.should_run == 'true'
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000 -o /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start within 60s"
          exit 1

      - name: Run SEO audit
        if: steps.filter.outputs.should_run == 'true'
        run: pnpm seo:audit http://localhost:3000

      - name: Stop server
        if: always() && steps.filter.outputs.should_run == 'true'
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Skip notice
        if: steps.filter.outputs.should_run != 'true'
        run: echo "No homepage-related files changed — skipping SEO audit"
