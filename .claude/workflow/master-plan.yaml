metadata:
  name: "Homepage & Navigation Redesign"
  description: "按 PRD 执行首页+导航栏重新设计，6 个 skill 链式编排"
  created_at: "2026-03-23T20:00:00+08:00"
  prd_file: "docs/plans/2026-03-23-homepage-navigation-redesign.md"

steps:
  - id: step-001
    name: "分析现有首页，输出改造方案"
    skill: "redesign-existing-projects"
    description: |
      分析 /Users/sky/Desktop/sciwangzhan/neonphysics-v2 的当前首页（localhost:3000）。
      项目技术栈：Next.js 16 + Tailwind CSS v4 + shadcn/ui (new-york) + next-intl (en/zh)。
      主题文件：src/config/style/theme-education.css（学术蓝 oklch(0.50 0.20 250)）。

      当前首页的问题：
      1. 导航栏 7 项过多（AI Visualizer/Experiments/Learn/Gallery/Pricing/More/Sign In）
      2. Hero 话术是功能导向（"Interactive 3D Physics Experiments"），需要改为成绩导向
      3. 缺少学科入口按钮、年级分流、实验精选展示
      4. 部分图标/图片还是 ShipAny 模板残留

      参考 PRD：docs/plans/2026-03-23-homepage-navigation-redesign.md

      输出：整体改造方案，包括导航栏结构、首页 8 个区块的设计方案、配色/字体/间距规范。
      不要写代码，只输出设计方案文档。
    timeout: 600
    retries: 1
    depends_on: []
    acceptance:
      - type: file_not_empty
        path: ".claude/workflow/results/step-001.json"

  - id: step-002
    name: "生成考试导向的中英文文案"
    skill: "landing-page-copywriter"
    description: |
      基于 PRD（docs/plans/2026-03-23-homepage-navigation-redesign.md）的中英文话术对照表，
      为首页所有 8 个区块生成高转化文案。

      品牌定位转变：
      - 旧：功能导向 "Interactive 3D Physics Experiments That Make Concepts Click"
      - 新：成绩导向 "Ace Your Science Exams with Interactive 3D Labs"

      目标用户：
      - 决策者（付费）: 家长 → 孩子通过考试、拿高分
      - 使用者（体验）: 学生 → 理解概念、完成作业、备考
      - 推荐者（影响）: 教师 → 教学辅助

      需要输出的文案（中英双语）：
      S1 Hero: 标题 + 副标题 + CTA
      S2 Experiment Showcase: 标题 + 3 张卡片描述
      S3 Grade Levels: 标题 + 5 个年级段描述
      S4 How It Works: 标题 + 3 步骤
      S5 AI Lab Teaser: 标题 + 描述 + 示例主题
      S6 Social Proof: 标题 + 课标列表
      S7 FAQ: 4 条精简问答
      S8 CTA: 标题 + 描述

      参考 PRD 中的话术对照表输出完整的 landing.json 格式文案。
      产品数据：64 个实验、5 大学科（Physics/Chemistry/Biology/Earth Science/Math）、K-2 到 AP 全覆盖。
    timeout: 600
    retries: 1
    depends_on:
      - step-001
    acceptance:
      - type: file_not_empty
        path: ".claude/workflow/results/step-002.json"

  - id: step-003
    name: "新区块设计参考"
    skill: "web-design-patterns"
    description: |
      为首页 3 个全新区块提供设计模式参考：

      1. S2 Experiment Showcase — 3 张跨学科精选实验卡片
         - 每张卡片含：缩略图、实验名称、学科标签、年级标签、"Try It" CTA
         - 底部 "Browse All 64 Experiments" 链接
         - 参考：PhET 首页的实验网格布局

      2. S3 Grade Levels — 按年级分流入口
         - 5 个年级段卡片：K-2 / 3-5 / 6-8 / 9-12 / AP
         - 每个卡片含：年级名、实验数量、适用年龄
         - 底部课标对齐信任标签

      3. S5 AI Lab Teaser — UPG 差异化卖点展示
         - 轻量单行展示，不抢实验库的主角地位
         - 包含 3 个示例主题标签 + CTA

      技术约束：Next.js 16 + Tailwind CSS v4 + shadcn/ui (new-york)
      主题：学术蓝 oklch(0.50 0.20 250)，标题 Merriweather serif，正文 Noto Sans

      输出：每个区块的 HTML/JSX 结构建议、Tailwind 类名方案、响应式断点。
    timeout: 600
    retries: 1
    depends_on:
      - step-001
    acceptance:
      - type: file_not_empty
        path: ".claude/workflow/results/step-003.json"

  - id: step-004
    name: "前端实现所有组件"
    skill: "frontend-design"
    description: |
      基于前 3 步的方案和文案，实现首页+导航栏的全部改动。

      项目路径：/Users/sky/Desktop/sciwangzhan/neonphysics-v2
      技术栈：Next.js 16 + Tailwind CSS v4 + shadcn/ui (new-york) + next-intl (en/zh)
      主题文件：src/config/style/theme-education.css
      Landing 页面入口：src/app/[locale]/(landing)/page.tsx
      Landing 区块组件：src/themes/default/blocks/
      动态渲染器：src/themes/default/pages/dynamic-page.tsx
      Locale 文件：src/config/locale/messages/{en,zh}/landing.json

      需要实现的改动：

      P0 — 必须做：
      1. 导航栏精简：修改 en/zh landing.json 的 header.nav，
         改为 4 主项（Subjects▾ / AI Lab / Pricing / Sign In），
         隐藏 Learn/Gallery，More 内容移到 footer
      2. Subjects 下拉菜单：新建组件或修改现有 nav 组件，
         展示 5 学科（Physics/Chemistry/Biology/Earth Science/Math）+ 年级快捷链接
      3. Hero 改造：更新 landing.json 话术 + 添加学科按钮入口组件
      4. S2 Experiment Showcase：新建 block 组件，展示 3 张跨学科精选实验
      5. S3 Grade Levels：新建 block 组件，5 个年级段卡片

      P1 — 应该做：
      6. How It Works 简化为 3 步
      7. Social Proof 区块话术更新
      8. CTA 话术更新
      9. FAQ 精简到 4 条

      注意事项：
      - 新区块需要在 dynamic-page.tsx 的 switch 中注册
      - landing.json 的 showSections 数组需要更新
      - 中英文 landing.json 必须同步修改
      - 使用 Lucide 图标（不要用 Remix 图标）
      - 实验数据从 src/shared/lib/experiments/ 的 registry 获取
    timeout: 1200
    retries: 2
    depends_on:
      - step-002
      - step-003
    acceptance:
      - type: file_exists
        path: "src/config/locale/messages/en/landing.json"
      - type: file_exists
        path: "src/config/locale/messages/zh/landing.json"
      - type: command
        run: "cd /Users/sky/Desktop/sciwangzhan/neonphysics-v2 && pnpm lint --max-warnings 0 2>&1 | tail -5"
        expect_exit: 0

  - id: step-005
    name: "交互动效打磨"
    skill: "interaction-design"
    description: |
      为首页新组件添加微交互和动效：

      项目路径：/Users/sky/Desktop/sciwangzhan/neonphysics-v2

      1. Subjects 下拉菜单：hover 展开动画（200ms ease-out）、学科图标 hover 缩放
      2. Hero 学科按钮：hover 上移+阴影、点击按压、入场 stagger 动画
      3. Experiment Showcase 卡片：hover 缩略图放大、卡片阴影
      4. Grade Levels 卡片：hover 边框高亮+背景色变化

      技术约束：纯 CSS/Tailwind 动画，不引入 Framer Motion，尊重 prefers-reduced-motion
    timeout: 600
    retries: 1
    depends_on:
      - step-004
    acceptance:
      - type: command
        run: "cd /Users/sky/Desktop/sciwangzhan/neonphysics-v2 && pnpm build 2>&1 | tail -3"
        expect_exit: 0

  - id: step-006
    name: "设计验收审查"
    skill: "design-review"
    description: |
      对改版后的首页进行全面设计验收审查。

      项目路径：/Users/sky/Desktop/sciwangzhan/neonphysics-v2
      首页地址：http://localhost:3000（英文）/ http://localhost:3000/zh（中文）

      审查清单：
      1. 视觉一致性：所有区块是否遵循学术蓝主题
      2. 间距对齐：区块间距、卡片间距、文字行距是否统一
      3. 排版层级：标题/副标题/正文的字号比例
      4. 响应式：桌面/平板/手机 3 个断点
      5. 中英文对比：两个语言版本的内容是否完整对应
      6. 交互反馈：hover/click 效果是否流畅
      7. AI slop 检测：是否有模板残留（ShipAny 品牌/图片/文案）
      8. 导航栏：Subjects 下拉是否正常工作
      9. 链接检查：所有 CTA 链接是否指向正确页面
      10. 无障碍：键盘导航、色彩对比度

      输出：审查报告（通过/不通过 + 具体问题 + 修复建议）
    timeout: 600
    retries: 1
    depends_on:
      - step-005
    acceptance:
      - type: file_not_empty
        path: ".claude/workflow/results/step-006.json"
